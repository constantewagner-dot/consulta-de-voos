                    if (f.fareOptions.length > 0) {
                        // Destaque na primeira (menor preço — já ordenado)
                        const hasClub = f.fareOptions.some(fo => fo.type === 'SMILES_CLUB');
                        const showCols = {
                            money: f.fareOptions.some(fo => fo.money != null),
                            miles: f.fareOptions.some(fo => fo.miles != null),
                            tax: f.fareOptions.some(fo => fo.costTax != null),
                        };
                        // Só mostra tabela se tiver mais de 1 opção OU se for Smiles (SMILES + SMILES_CLUB)
                        const showTable = f.fareOptions.length > 1;

                        if (showTable) {
                            let thHtml = '<tr><th>Tipo</th>';
                            if (showCols.money) thHtml += '<th>💰 Valor</th>';
                            if (showCols.miles) thHtml += '<th>🎯 Pontos</th>';
                            if (showCols.tax) thHtml += '<th>🧾 Taxas</th>';
                            thHtml += '</tr>';

                            let tbHtml = '';
                            for (let i = 0; i < f.fareOptions.length; i++) {
                                const fo = f.fareOptions[i];
                                const isLowest = i === 0;
                                const typeLabel = formatFareType(fo.type);
                                tbHtml += `<tr class="fare-row${isLowest?' selected-fare':''}">`;
                                tbHtml += `<td><span class="fare-type">${typeLabel}</span></td>`;
                                if (showCols.money) tbHtml +=
                                    `<td>${fo.money!=null?'<strong>R$ '+fo.money.toLocaleString('pt-BR',{minimumFractionDigits:2})+ '</strong>':'—'}</td>`;
                                if (showCols.miles) tbHtml +=
                                    `<td>${fo.miles!=null?'<strong>'+fo.miles.toLocaleString('pt-BR')+'</strong>':'—'}</td>`;
                                if (showCols.tax) tbHtml +=
                                    `<td>${fo.costTax!=null?'<span class="badge badge-tax">+R$ '+Number(fo.costTax).toFixed(2)+'</span>':'—'}</td>`;
                                tbHtml += '</tr>';
                            }
                            fareTable =
                                `<table class="fare-options-table"><thead>${thHtml}</thead><tbody>${tbHtml}</tbody></table>`;
                        }
                    }

                    // Preço principal (primeira fare option)
                    const bestFo = f.fareOptions[0] || {};
                    let priceHtml = '';
                    if (bestFo.money != null) {
                        priceHtml +=
                            `<span class="price-money">R$ ${bestFo.money.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2})}</span>`;
                    }
                    if (bestFo.miles != null) {
                        priceHtml +=
                            `<span class="price-points">${bestFo.miles.toLocaleString('pt-BR')} pts</span>`;
                    }
                    if (bestFo.costTax != null) {
                        priceHtml +=
                            `<span class="price-tax">+ taxas R$ ${Number(bestFo.costTax).toFixed(2)}</span>`;
                    }
                    if (!bestFo.money && !bestFo.miles) {
                        priceHtml += '<span style="color:#999;font-size:0.78rem;">Ver opções abaixo</span>';
                    }

                    body += `
                <div class="flight-card" data-direction="${dir}" data-flight-id="${f.id}">
                  <div class="select-indicator">✓</div>
                  <span class="airline-tag" style="background:${f.airlineColor}">${f.airline}</span>
                  <div class="route-line">${f.from} → ${f.to}</div>
                  <div class="time-line">🕐 ${f.dep||'--:--'} → ${f.arr||'--:--'} &nbsp;|&nbsp; ⏱ ${f.durationStr}</div>
                  <div class="flight-meta">${sBadge}${fnBadge}${acBadge}</div>
                  <div class="price-area">${priceHtml}</div>
                  ${fareTable}
                </div>`;
                }
            }

            return `<div class="trip-column">
            <div class="trip-column-header ${dir}">${label} <span style="font-weight:400;font-size:0.78rem;margin-left:auto;">${flights.length} voo(s)</span></div>
            <div class="trip-column-body">${body}</div>
          </div>`;
        }

        function formatFareType(type) {
            if (!type) return 'Tarifa';
            const map = {
                'SMILES': '🎯 Smiles',
                'SMILES_CLUB': '⭐ Smiles Club',
                'SMILES_TIER': '👑 Smiles Elite',
                'SMILES_MONEY': '💳 Smiles + $',
                'SMILES_MONEY_CLUB': '⭐ Club + $',
                'Azul': '💺 Azul',
                'Pontos': '🎯 Pontos',
                'LATAM': '💺 LATAM',
                'GOL': '💺 GOL',
            };
            return map[type] || type.replace(/_/g, ' ');
        }

        function selectFlight(dir, flightId) {
            const flight = allFlights[dir].find(f => f.id === flightId);
            if (!flight) return;
            if (dir === 'ida') selectedIda = (selectedIda?.id === flightId) ? null : flight;
            else selectedVolta = (selectedVolta?.id === flightId) ? null : flight;
            document.querySelectorAll(`.flight-card[data-direction="${dir}"]`).forEach(card =>
                card.classList.toggle('selected', card.dataset.flightId === (dir === 'ida' ? selectedIda?.id :
                    selectedVolta?.id)));
            updateSummary();
        }

        function updateSummary() {
            const bar = document.getElementById('summaryBar');
            const wp = document.getElementById('btnWhatsapp');
            const idaItem = document.getElementById('summaryIdaItem');
            const voltaItem = document.getElementById('summaryVoltaItem');
            const hasIda = !!selectedIda;
            const hasVolta = tripType === 'roundtrip' && !!selectedVolta;

            if (!hasIda && !hasVolta) { bar.classList.remove('show'); return; }
            bar.classList.add('show');
            idaItem.style.display = hasIda ? '' : 'none';
            voltaItem.style.display = hasVolta ? '' : 'none';
            document.getElementById('summaryIda').textContent = hasIda ? fmtSummary(selectedIda) : '—';
            document.getElementById('summaryVolta').textContent = hasVolta ? fmtSummary(selectedVolta) : '—';

            let total = 0,
                totalPts = 0,
                hm = false,
                hp = false;
            if (selectedIda?.fareOptions?.[0]?.money) { total += selectedIda.fareOptions[0].money;
                hm = true; }
            if (selectedIda?.fareOptions?.[0]?.miles) { totalPts += selectedIda.fareOptions[0].miles;
                hp = true; }
            if (selectedVolta?.fareOptions?.[0]?.money) { total += selectedVolta.fareOptions[0].money;
                hm = true; }
            if (selectedVolta?.fareOptions?.[0]?.miles) { totalPts += selectedVolta.fareOptions[0].miles;
                hp = true; }
            let ts = '';
            if (hm) ts += `R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
            if (hp) ts += (ts ? ' + ' : '') + `${totalPts.toLocaleString('pt-BR')} pts`;
            document.getElementById('summaryTotal').textContent = ts || '—';

            const required = tripType === 'roundtrip' ? (selectedIda && selectedVolta) : !!selectedIda;
            wp.disabled = !required;
            wp.textContent = required ? '💬 WhatsApp' : (tripType === 'roundtrip' ? '⚠️ Selecione ida E volta' :
                '⚠️ Selecione um voo');
        }

        function fmtSummary(f) {
            const fo = f.fareOptions[0] || {};
            const parts = [`${f.airline}`, `${f.from}→${f.to}`, `${f.dep||'--:--'}`];
            if (fo.money) parts.push(`R$ ${fo.money.toFixed(2)}`);
            if (fo.miles) parts.push(`${fo.miles.toLocaleString('pt-BR')} pts`);
            return parts.join(' | ');
        }

        // ═══════════════════════════════════════════════════════════
        //  WHATSAPP
        // ═══════════════════════════════════════════════════════════
        function buildMessage() {
            let m = '✈️ *Cotação de Voos*\n\n';
            const depD = document.getElementById('depDate').value.split('-').reverse().join('/');

            function addFlight(label, f, dateStr) {
                if (!f) return;
                const fo = f.fareOptions[0] || {};
                m += `${label}: ${f.from} → ${f.to}\n`;
                m +=
                    `   📅 ${dateStr} | 🕐 ${f.dep||'--:--'} → ${f.arr||'--:--'} | ${f.durationStr}\n`;
                m += `   ✈️ ${f.airline} | ${f.stops===0?'Direto':f.stops+' parada(s)'}\n`;
                if (fo.money) m += `   💰 R$ ${fo.money.toFixed(2)}\n`;
                if (fo.miles) m += `   🎯 ${fo.miles.toLocaleString('pt-BR')} pts\n`;
                if (fo.costTax) m += `   🧾 Taxas: R$ ${Number(fo.costTax).toFixed(2)}\n`;
                if (f.flightNumbers?.length) m += `   🔢 Voo: ${f.flightNumbers.join(' / ')}\n`;
                m += '\n';
            }

            addFlight('🟢 *IDA*', selectedIda, depD);
            if (tripType === 'roundtrip') {
                const retD = document.getElementById('retDate').value.split('-').reverse().join('/');
                addFlight('🔴 *VOLTA*', selectedVolta, retD);
            }

            let tM = 0,
                tP = 0;
            if (selectedIda?.fareOptions?.[0]?.money) tM += selectedIda.fareOptions[0].money;
            if (selectedVolta?.fareOptions?.[0]?.money) tM += selectedVolta.fareOptions[0].money;
            if (selectedIda?.fareOptions?.[0]?.miles) tP += selectedIda.fareOptions[0].miles;
            if (selectedVolta?.fareOptions?.[0]?.miles) tP += selectedVolta.fareOptions[0].miles;
            if (tM > 0 || tP > 0) {
                m += '💵 *TOTAL*: ';
                if (tM > 0) m += `R$ ${tM.toFixed(2)}`;
                if (tP > 0) m += `${tM>0?' + ':''}${tP.toLocaleString('pt-BR')} pts`;
                m += '\n\n';
            }
            m +=
                `🔗 ${selectedIda?.from||'?'} ↔ ${selectedIda?.to||'?'} | ${new Date().toLocaleDateString('pt-BR')}`;
            return m;
        }

        function openWhatsappModal() {
            const msg = buildMessage();
            document.getElementById('msgPreview').textContent = msg;
            document.getElementById('btnSendWa').href =
                `https://wa.me/?text=${encodeURIComponent(msg)}`;
            document.getElementById('whatsappModal').classList.add('show');
            document.getElementById('btnCopy').textContent = '📋 Copiar';
            document.getElementById('btnCopy').classList.remove('copied');
        }

        function closeWhatsappModal() { document.getElementById('whatsappModal').classList.remove('show'); }

        function copyMessage() {
            navigator.clipboard.writeText(document.getElementById('msgPreview').textContent).then(() => {
                const b = document.getElementById('btnCopy');
                b.textContent = '✅ Copiado!';
                b.classList.add('copied');
                showToast('📋 Mensagem copiada!');
                setTimeout(() => { b.textContent = '📋 Copiar';
                    b.classList.remove('copied'); }, 2000);
            }).catch(() => showToast('❌ Erro ao copiar'));
        }
        document.addEventListener('click', (e) => { if (e.target.id === 'whatsappModal') closeWhatsappModal(); });

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._tid);
            t._tid = setTimeout(() => t.classList.remove('show'), 2500);
        }

        // ═══════════════════════════════════════════════════════════
        //  INIT
        // ═══════════════════════════════════════════════════════════
        renderAirlineToggles();
        updateStatusBar();
    </script>
</body>
</html>
