<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✈️ Consulta de Voos</title>

    <!-- ═══════════════════════════════════════════════════════════ -->
    <!--  CSS — Design System                                      -->
    <!-- ═══════════════════════════════════════════════════════════ -->
    <style>
        :root {
            --bg: #f0f2f5;
            --card: #fff;
            --border: #e0e0e0;
            --text: #1a1a2e;
            --sub: #666;
            --primary: #1a73e8;
            --success: #0d8a3e;
            --danger: #d93025;
            --warning: #e67e22;
            --purple: #6B2D8B;
            --radius: 12px;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            padding: 14px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-logo {
            font-size: 1.3rem;
            font-weight: 700;
        }
        .header-logo span {
            color: #4fc3f7;
        }
        .header-badge {
            background: #ffffff22;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            letter-spacing: 0.5px;
            transition: all 0.3s;
        }
        .api-key-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .api-key-wrap input {
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #ffffff44;
            background: #ffffff11;
            color: #fff;
            font-size: 0.78rem;
            width: 220px;
            outline: none;
            font-family: monospace;
        }
        .api-key-wrap input::placeholder {
            color: #ffffff66;
        }
        .api-key-wrap input:focus {
            border-color: #4fc3f7;
        }
        .btn-sm {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.72rem;
            font-weight: 600;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .btn-sm.ghost {
            background: #ffffff22;
            color: #fff;
        }
        .btn-sm.ghost:hover {
            background: #ffffff44;
        }

        /* Main Container */
        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 18px 16px;
        }

        /* Toggle Bars */
        .toggles-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .toggle-bar {
            display: flex;
            gap: 0;
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .toggle-btn {
            padding: 9px 20px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--sub);
            transition: all 0.2s;
            white-space: nowrap;
        }
        .toggle-btn.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 2px 6px rgba(26, 115, 232, 0.3);
        }
        .toggle-btn:hover:not(.active) {
            background: #f5f7fa;
            color: var(--text);
        }

        /* Search Card */
        .search-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 12px;
        }
        .search-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .search-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            min-width: 130px;
        }
        .search-field label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--sub);
        }
        .search-field input,
        .search-field select {
            padding: 9px 11px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
            background: #fafafa;
            font-family: inherit;
        }
        .search-field input:focus,
        .search-field select:focus {
            border-color: var(--primary);
            background: #fff;
        }
        .btn-search {
            padding: 10px 26px;
            background: var(--success);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.92rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            align-self: flex-end;
            min-height: 42px;
        }
        .btn-search:hover:not(:disabled) {
            background: #0b7532;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(13, 138, 62, 0.3);
        }
        .btn-search:disabled {
            background: #aaa;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Airport Selector */
        .airport-selector {
            position: relative;
        }
        .airport-input-wrap {
            position: relative;
        }
        .airport-input-wrap input {
            width: 100%;
            padding-right: 28px;
        }
        .airport-input-wrap .clear-btn {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 1.2rem;
            color: #bbb;
            cursor: pointer;
            padding: 4px;
            display: none;
            line-height: 1;
        }
        .airport-input-wrap.has-value .clear-btn {
            display: block;
        }
        .airport-input-wrap .clear-btn:hover {
            color: #555;
        }
        .airport-dropdown {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: #fff;
            border: 2px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.14);
            max-height: 320px;
            overflow-y: auto;
            z-index: 50;
            display: none;
        }
        .airport-dropdown.show {
            display: block;
        }
        .airport-dropdown-header {
            padding: 9px 14px;
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: #888;
            border-bottom: 1px solid #f0f0f0;
            background: #fafafa;
            position: sticky;
            top: 0;
        }
        .airport-item {
            padding: 9px 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.1s;
        }
        .airport-item:hover {
            background: #eef2ff;
        }
        .airport-item .iata {
            font-weight: 800;
            font-size: 0.95rem;
            color: var(--primary);
            min-width: 40px;
        }
        .airport-item .info {
            flex: 1;
            min-width: 0;
        }
        .airport-item .city {
            font-weight: 600;
            font-size: 0.85rem;
        }
        .airport-item .name {
            font-size: 0.7rem;
            color: var(--sub);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .airport-dropdown .no-results {
            padding: 22px;
            text-align: center;
            color: #aaa;
            font-size: 0.8rem;
        }

        /* Filters Row */
        .filters-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 12px;
            justify-content: center;
        }
        .filter-group {
            display: flex;
            gap: 0;
            background: var(--card);
            border-radius: 8px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .filter-btn {
            padding: 8px 16px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--sub);
            transition: all 0.2s;
            white-space: nowrap;
        }
        .filter-btn.active {
            background: var(--purple);
            color: #fff;
        }
        .filter-btn:hover:not(.active) {
            background: #f5f0fa;
        }
        .airline-toggles {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .airline-chip {
            padding: 6px 14px;
            border: 2px solid var(--border);
            border-radius: 20px;
            background: var(--card);
            cursor: pointer;
            font-size: 0.76rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .airline-chip.active {
            border-color: #333;
            background: #fff;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
        }
        .airline-chip.incompatible {
            opacity: 0.3;
            cursor: not-allowed;
            text-decoration: line-through;
        }
        .airline-chip .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        /* Status Bar */
        .status-bar {
            text-align: center;
            font-size: 0.76rem;
            padding: 6px;
            color: var(--sub);
            min-height: 26px;
        }
        .status-bar.warning {
            color: var(--danger);
            font-weight: 600;
        }
        .status-bar.ok {
            color: var(--success);
        }

        /* Loading */
        .loading-overlay {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .loading-overlay.show {
            display: block;
        }
        .spinner {
            width: 42px;
            height: 42px;
            border: 4px solid #e0e0e0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        #loadingText {
            color: #666;
            font-size: 0.85rem;
        }

        /* Results */
        .results-section {
            display: none;
        }
        .results-section.show {
            display: block;
        }
        .trip-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .trip-columns.single {
            grid-template-columns: 1fr;
            max-width: 650px;
            margin: 0 auto;
        }
        @media (max-width: 768px) {
            .trip-columns {
                grid-template-columns: 1fr;
            }
            .trip-columns.single {
                max-width: 100%;
            }
        }
        .trip-column {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .trip-column-header {
            padding: 11px 16px;
            font-weight: 700;
            font-size: 0.88rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 2px solid #f0f0f0;
        }
        .trip-column-header.ida {
            background: #e3f2fd;
            color: #1565c0;
        }
        .trip-column-header.volta {
            background: #fce4ec;
            color: #c62828;
        }
        .trip-column-body {
            max-height: 580px;
            overflow-y: auto;
            padding: 6px;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
            font-size: 0.82rem;
        }
        .error-card {
            background: #fffbe6;
            margin: 6px;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            color: #795548;
            border-left: 3px solid var(--warning);
        }

        /* Flight Card */
        .flight-card {
            border: 2px solid #f0f0f0;
            border-radius: 10px;
            padding: 13px 15px;
            margin: 5px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            background: #fff;
        }
        .flight-card:hover {
            border-color: #ccc;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        .flight-card.selected {
            border-color: var(--success);
            background: #f6fff6;
            box-shadow: 0 0 0 2px rgba(13, 138, 62, 0.12);
        }
        .flight-card .check {
            position: absolute;
            top: 10px;
            right: 12px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: transparent;
            transition: all 0.2s;
        }
        .flight-card.selected .check {
            background: var(--success);
            border-color: var(--success);
            color: #fff;
        }
        .flight-card .top-row {
            display: flex;
            align-items: center;
            gap: 7px;
            margin-bottom: 7px;
            flex-wrap: wrap;
        }
        .flight-card .op-airline-tag {
            display: inline-block;
            padding: 3px 11px;
            border-radius: 14px;
            font-size: 0.7rem;
            font-weight: 700;
            color: #fff;
        }
        .flight-card .src-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.58rem;
            font-weight: 600;
            background: #f0f0f0;
            color: #777;
        }
        .flight-card .route {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 3px;
        }
        .flight-card .times {
            color: var(--sub);
            font-size: 0.82rem;
            margin-bottom: 5px;
        }
        .flight-card .meta {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-top: 4px;
        }
        .badge {
            padding: 2px 9px;
            border-radius: 10px;
            font-size: 0.66rem;
            font-weight: 600;
        }
        .badge-direct {
            background: #e8f5e9;
            color: #0d8a3e;
        }
        .badge-stops {
            background: #fff3e0;
            color: #e67e22;
        }
        .badge-flight {
            background: #e3f2fd;
            color: #1565c0;
        }
        .badge-fare {
            background: #ede7f6;
            color: #6B2D8B;
        }
        .badge-tax {
            background: #fce4ec;
            color: #c62828;
            font-size: 0.7rem;
        }
        .flight-card .prices {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 9px;
            flex-wrap: wrap;
        }
        .price-money {
            font-size: 1.3rem;
            font-weight: 800;
            color: #0d8a3e;
        }
        .price-points {
            font-size: 0.88rem;
            font-weight: 700;
            color: #6B2D8B;
        }
        .price-tax {
            font-size: 0.68rem;
            color: #c62828;
            font-weight: 600;
        }

        /* Fare Table */
        .fare-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 7px;
            font-size: 0.73rem;
        }
        .fare-table th {
            font-size: 0.62rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #888;
            padding: 3px 7px;
            text-align: left;
            border-bottom: 1px solid #eee;
            background: #fafafa;
        }
        .fare-table td {
            padding: 4px 7px;
            border-bottom: 1px solid #f5f5f5;
            font-size: 0.76rem;
        }
        .fare-table .best-fare {
            background: #e8f5e9;
            font-weight: 700;
        }

        /* Summary Bar */
        .summary-bar {
            display: none;
            background: var(--card);
            border-radius: var(--radius);
            padding: 15px 20px;
            margin-top: 14px;
            box-shadow: var(--shadow);
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .summary-bar.show {
            display: flex;
        }
        .summary-info {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }
        .summary-info .item {
            font-size: 0.8rem;
        }
        .summary-total {
            font-size: 1.4rem;
            font-weight: 800;
            color: #0d8a3e;
        }
        .btn-whatsapp {
            padding: 10px 22px;
            background: #25D366;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-whatsapp:hover:not(:disabled) {
            background: #1ebe5b;
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
        }
        .btn-whatsapp:disabled {
            background: #bbb;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal {
            background: #fff;
            border-radius: var(--radius);
            padding: 24px;
            max-width: 480px;
            width: 92%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal h3 {
            margin-bottom: 8px;
            font-size: 1.1rem;
        }
        .modal .msg-preview {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 12px;
            font-size: 0.8rem;
            line-height: 1.6;
            white-space: pre-wrap;
            font-family: inherit;
            max-height: 260px;
            overflow-y: auto;
            margin-bottom: 14px;
            border: 1px solid #e0e0e0;
        }
        .modal .btn-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .modal .btn-row button,
        .modal .btn-row a {
            padding: 9px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .btn-copy {
            background: #333;
            color: #fff;
        }
        .btn-copy:hover {
            background: #555;
        }
        .btn-send-wa {
            background: #25D366;
            color: #fff;
        }
        .btn-send-wa:hover {
            background: #1ebe5b;
        }
        .btn-close-modal {
            background: #eee;
            color: #333;
        }
        .btn-close-modal:hover {
            background: #ddd;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 10px 22px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.8rem;
            z-index: 300;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
        }

        /* Debug Panel */
        .debug-panel {
            background: #1a1a2e;
            color: #4fc3f7;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.7rem;
            padding: 10px 16px;
            border-radius: 8px;
            margin-top: 12px;
            max-height: 160px;
            overflow-y: auto;
            display: none;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .debug-panel.show {
            display: block;
        }
        .debug-toggle {
            background: none;
            border: 1px dashed #ccc;
            color: #999;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.65rem;
            cursor: pointer;
            margin-top: 8px;
        }
        .debug-toggle:hover {
            border-color: #888;
            color: #666;
        }

        @media (max-width: 600px) {
            .search-row {
                flex-direction: column;
            }
            .search-field {
                min-width: 100%;
            }
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            .api-key-wrap input {
                width: 150px;
            }
            .toggles-row {
                flex-direction: column;
                align-items: center;
                gap: 8px;
            }
            .flight-card .prices {
                flex-direction: column;
                align-items: flex-start;
                gap: 3px;
            }
            .summary-bar {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-logo">✈️ Consulta de <span>Voos</span></div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
            <div class="api-key-wrap">
                <input type="password" id="apiKeyInput" placeholder="Chave GeckoAPI (ex: gck_...)" />
                <button class="btn-sm ghost" onclick="App.saveApiKey()" title="Salvar chave">💾</button>
                <button class="btn-sm ghost" onclick="App.testApi()" title="Testar conexão">🔌</button>
            </div>
            <span class="header-badge" id="apiStatus">⚪ Não configurada</span>
        </div>
    </header>

    <div class="main-container">
        <!-- Toggles -->
        <div class="toggles-row">
            <div class="toggle-bar" id="tripTypeBar">
                <button class="toggle-btn active" data-type="roundtrip">🔄 Ida e Volta</button>
                <button class="toggle-btn" data-type="oneway">➡️ Apenas Ida</button>
            </div>
            <div class="toggle-bar" id="regionBar">
                <button class="toggle-btn active" data-region="nacional">🇧🇷 Nacional</button>
                <button class="toggle-btn" data-region="internacional">🌎 Internacional</button>
            </div>
        </div>

        <!-- Search Form -->

        };

        // ╔══════════════════════════════════════════════════════════════╗
        // ║  STATE — Gerenciamento de estado da aplicação              ║
        // ╚══════════════════════════════════════════════════════════════╝
        const State = {
            apiKey: localStorage.getItem('geckoApiKey') || '',
            region: 'nacional',
            tripType: 'roundtrip',
            searchType: 'both',
            selectedAirlines: new Set(['LATAM', 'AZUL', 'SMILES', 'GOL']),
            selectedIda: null,
            selectedVolta: null,
            fromAirport: null,
            toAirport: null,
            allFlights: { ida: [], volta: [] },
            errors: [],
            debugLogs: [],

            init() {
                if (this.apiKey) {
                    document.getElementById('apiKeyInput').value = this.apiKey;
                    this._updateApiStatus('configured');
                }
                this._setDefaultDates();
                UI.renderAirlineToggles();
                UI.updateStatusBar();
                UI.initAirportSelectors();
                UI.initToggleBars();
                UI.applyTripTypeUI();
            },

            _setDefaultDates() {
                const now = new Date();
                const ida = new Date(now);
                ida.setDate(ida.getDate() + 14);
                const volta = new Date(ida);
                volta.setDate(volta.getDate() + 7);
                document.getElementById('depDate').value = ida.toISOString().split('T')[0];
                document.getElementById('retDate').value = volta.toISOString().split('T')[0];
            },

            getActiveTargets() {
                const targets = [];
                for (const id of this.selectedAirlines) {
                    const cfg = CONFIG.AIRLINES[id];
                    if (!cfg) continue;
                    const compat = this.searchType === 'money' ? cfg.canMoney :
                        this.searchType === 'points' ? cfg.canPoints : true;
                    if (compat) targets.push(cfg);
                }
                return targets;
            },

            isCompatible(airlineId) {
                const cfg = CONFIG.AIRLINES[airlineId];
                if (!cfg) return false;
                if (this.searchType === 'money') return cfg.canMoney;
                if (this.searchType === 'points') return cfg.canPoints;
                return true;
            },

            getIata(field) {
                const el = document.getElementById(field === 'from' ? 'fromAirport' : 'toAirport');
                const val = el.value.trim();
                if (!val) return null;
                const m = val.match(/^([A-Z]{3})\b/);
                if (m) return m[1];
                return val.toUpperCase().replace(/[^A-Z]/g, '').substring(0, 3) || null;
            },

            log(msg) {
                const ts = new Date().toLocaleTimeString();
                const entry = `[${ts}] ${msg}`;
                this.debugLogs.push(entry);
                if (CONFIG.DEBUG) console.log(entry);
                const panel = document.getElementById('debugPanel');
                if (panel && panel.classList.contains('show')) {
                    panel.textContent = this.debugLogs.slice(-30).join('\n');
                }
            },

            _updateApiStatus(status) {
                const el = document.getElementById('apiStatus');
                const map = {
                    'configured': { t: '🟢 Configurada', c: '#4fc3f7' },
                    'testing': { t: '🟡 Testando...', c: '#ffd54f' },
                    'ok': { t: '🟢 Conectada', c: '#69f0ae' },
                    'error': { t: '🔴 Falha', c: '#ff5252' },
                    'empty': { t: '⚪ Não configurada', c: '#ffffff88' },
                };
                const s = map[status] || map['empty'];
                el.textContent = s.t;
                el.style.color = s.c;
            },
        };

        // ╔══════════════════════════════════════════════════════════════╗
        // ║  API — Chamadas à GeckoAPI                                 ║
        // ╚══════════════════════════════════════════════════════════════╝
        const API = {
            async call(target, payload) {
                State.log(`API: ${target.label} ← ${JSON.stringify(payload)}`);
                const resp = await fetch(CONFIG.GECKO_API, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${State.apiKey}`,
                    },
                    body: JSON.stringify(payload),
                });

                const text = await resp.text();
                if (!resp.ok) {
                    throw new Error(`HTTP ${resp.status}: ${text.substring(0, 200)}`);
                }

                let json;
                try {
                    json = JSON.parse(text);
                } catch (e) {
                    throw new Error(`JSON inválido: ${text.substring(0, 200)}`);
                }

                if (json.notFound === true || json.data === null) {
                    State.log(`API: ${target.label} → notFound`);
                    return { notFound: true, data: null };
                }

                State.log(`API: ${target.label} → OK. data keys: ${json.data ? Object.keys(json.data).slice(0,8).join(', ') : 'null'}`);
                return { notFound: false, data: json.data };
            },

            async searchAll(from, to, depDate, retDate, adults) {
                const targets = State.getActiveTargets();
                if (targets.length === 0) throw new Error('Nenhuma cia aérea compatível selecionada');

                const requests = [];
                for (const tgt of targets) {
                    const idaPayload = tgt.buildPayload(from, to, depDate, adults, State.searchType);
                    requests.push({ target: tgt, payload: idaPayload, direction: 'ida' });

                    if (State.tripType === 'roundtrip' && retDate) {
                        const voltaPayload = tgt.buildPayload(to, from, retDate, adults, State.searchType);
                        requests.push({ target: tgt, payload: voltaPayload, direction: 'volta' });
                    }
                }

                State.log(`Iniciando ${requests.length} chamadas em paralelo...`);

                const results = await Promise.allSettled(
                    requests.map(req => this.call(req.target, req.payload).then(r => ({
                        ...r,
                        direction: req.direction,
                        target: req.target,
                    })))
                );

                const flights = { ida: [], volta: [] };
                const errors = [];

                for (const r of results) {
                    if (r.status === 'rejected') {
                        const msg = r.reason?.message || String(r.reason);
                        errors.push({ direction: '?', label: 'API', reason: msg });
                        State.log(`ERRO: ${msg}`);
                        continue;
                    }

                    const { direction, target, notFound, data } = r.value;
                    if (notFound) {
                        errors.push({ direction, label: target.label, reason: 'Rota não disponível nesta cia' });
                        continue;
                    }

                    const parsed = Parsers.parse(target.parser, data, target);
                    State.log(`${target.label} (${target.parser}) ${direction}: ${parsed.length} voo(s)`);
                    for (const f of parsed.slice(0, 2)) {
                        State.log(`  → ${f.from}→${f.to} ${f.dep}→${f.arr} op:${f.operatingAirline||'?'} stops:${f.stops} fares:${f.fareOptions.length}`);
                    }

                    if (parsed.length > 0) {
                        flights[direction].push(...parsed);
                    } else {
                        errors.push({ direction, label: target.label, reason: '0 voos extraídos' });
                    }
                }

                return { flights, errors };
            },

            async testConnection() {
                if (!State.apiKey) throw new Error('Chave não configurada');
                const cfg = CONFIG.AIRLINES['LATAM'];
                const payload = cfg.buildPayload('GRU', 'GIG', App.getFutureDate(14), 1, 'money');
                await this.call(cfg, payload);
            },
        };

        // ╔══════════════════════════════════════════════════════════════╗
        // ║  PARSERS — Extração de voos por cia aérea                  ║
        // ╚══════════════════════════════════════════════════════════════╝
        const Parsers = {
            parse(parserName, data, cfg) {
                switch (parserName) {
                    case 'azul':
                        return this._parseAzul(data, cfg);
                    case 'latam':
                        return this._parseLatam(data, cfg);
                    case 'smiles':
                        return this._parseSmiles(data, cfg);
                    case 'gol':
                        return this._parseGol(data, cfg);
                    default:
                        return this._parseGeneric(data, cfg);
                }
            },

            /** Cria um objeto de voo padronizado */
            _makeFlight(cfg, opts) {
                const fareOptions = this._filterFares(opts.fareOptions || []);
                if (fareOptions.length === 0) return null;
                return {
                    id: `${cfg.parser}-${opts.flightNumbers?.[0] || Math.random().toString(36).slice(2,8)}`,
                    sourceAirline: cfg.label,
                    sourceColor: cfg.color,
                    operatingAirline: opts.operatingAirline || cfg.label,
                    operatingCode: opts.operatingCode || cfg.id,
                    operatingColor: opts.operatingColor || cfg.color,
                    from: opts.from || '?',
                    to: opts.to || '?',
                    dep: opts.dep || null,
                    arr: opts.arr || null,
                    durationStr: opts.durationStr || '—',
                    stops: opts.stops || 0,
                    flightNumbers: opts.flightNumbers || [],
                    aircraft: opts.aircraft || null,
                    fareOptions,
                };
            },

            _filterFares(fareOptions) {
                if (State.searchType === 'both') return fareOptions;
                if (State.searchType === 'money') return fareOptions.filter(f => f.money != null);
                if (State.searchType === 'points') return fareOptions.filter(f => f.miles != null);
                return fareOptions;
            },

            _fmtTime(iso) {
                if (!iso) return null;
                const s = String(iso);
                const m = s.match(/T(\d{2}:\d{2})/) || s.match(/(\d{1,2}:\d{2})/);
                return m ? m[1] : null;
            },

            _fmtDuration(d) {
                if (!d) return '—';
                const s = String(d);
                const h = s.match(/(\d+)H/);
                const m = s.match(/(\d+)M/);
                if (h || m) return `${h?parseInt(h[1]):0}h${String(m?parseInt(m[1]):0).padStart(2,'0')}m`;
                const hm = s.match(/(\d+):(\d+)/);
                if (hm) return `${parseInt(hm[1])}h${String(parseInt(hm[2])).padStart(2,'0')}m`;
                return s;
            },

            _extractCarrier(segments) {
                if (!segments?.length) return null;
                const s = segments[0];
                // Caminhos possíveis
                const paths = [
                    ['flight', 'carrierCode'],
                    ['flight', 'operatingCarrier'],
                    ['flight', 'airlineCode'],
                    ['operatingCarrier'],
                    ['operatingCarrier', 'code'],
                    ['carrier'],
                    ['carrier', 'code'],
                    ['airline'],
                    ['airline', 'code'],
                    ['marketingCarrier'],
                ];
                for (const path of paths) {
                    let v = s;
                    for (const k of path) { if (v && typeof v === 'object') v = v[k];
                        else { v = null; break; } }
                    if (v && typeof v === 'string' && v.length <= 6) return v.toUpperCase();
                }
                return null;
            },

            _airlineName(code) {
                return CONFIG.AIRLINE_DISPLAY[code] || code || null;
            },

            _airlineColor(code) {
                return CONFIG.AIRLINE_COLORS[code] || '#333';
            },

            // ── AZUL: data.trips[].journeys[] ──
            _parseAzul(data, cfg) {
                const flights = [];
                for (const trip of data.trips || []) {
                    for (const j of trip.journeys || []) {
                        if (!j.available) continue;
                        const segs = j.segments || [];
                        const carrier = this._extractCarrier(segs) || 'AD';

                        const fos = [];
                        for (const fare of j.fares || []) {
                            if (fare.total?.amount != null) {
                                fos.push({ type: fare.productClass?.name || 'Tarifa', money: Number(fare.total.amount),
                                    miles: null, costTax: null });
                            }
                            for (const po of fare.pointsOptions || []) {
                                const pts = po.amount ?? po.points ?? po.miles ?? null;
                                if (pts != null) {
                                    fos.push({ type: 'Pontos', money: null, miles: Number(pts), costTax: po.taxes ?? po
                                            .tax ?? po.costTax ?? null });
                                }
                            }
                        }
                        if (fos.length === 0) continue;

                        const f = this._makeFlight(cfg, {
                            from: j.origin || trip.origin,
                            to: j.destination || trip.destination,
                            dep: this._fmtTime(j.departure),
                            arr: this._fmtTime(j.arrival),
                            durationStr: this._fmtDuration(j.duration),
                            stops: j.stopsCount || 0,
                            flightNumbers: [segs[0]?.flight?.flightNumber].filter(Boolean),
                            aircraft: segs[0]?.flight?.equipmentName || null,
                            operatingAirline: this._airlineName(carrier),
                            operatingCode: carrier,
                            operatingColor: this._airlineColor(carrier),
                            fareOptions: fos,
                        });
                        if (f) flights.push(f);
                    }
                }
                return flights;
            },

            // ── LATAM: data.items[] ──
            _parseLatam(data, cfg) {
                let items = null;
                if (Array.isArray(data.items)) items = data.items;
                else if (Array.isArray(data.flights)) items = data.flights;
                else if (Array.isArray(data.itineraries)) items = data.itineraries;
                else if (data.availability?.flights) items = data.availability.flights;
                else {
                    // scan recursivo
                    const scan = (obj, d) => {
                        if (d > 5 || !obj || typeof obj !== 'object') return null;
                        if (Array.isArray(obj) && obj.length > 0 && typeof obj[0] === 'object') return obj;
                        for (const v of Object.values(obj)) { const r = scan(v, d + 1); if (r) return r; }
                        return null;
                    };
                    items = scan(data, 0);
                }
                if (!items?.length) return [];

                const flights = [];
                for (const item of items) {
                    let segs = [];
                    for (const k of ['segments', 'flights', 'legs', 'journeys', 'bounds', 'connections']) {
                        if (Array.isArray(item[k]) && item[k].length) { segs = item[k]; break; }
                    }
                    if (!segs.length) segs = [item];

                    const first = segs[0],
                        last = segs[segs.length - 1];
                    const carrier = this._extractCarrier(segs) || 'LA';

                    const fos = [];
                    if (Array.isArray(item.fares)) {
                        for (const f of item.fares) {
                            const m = f.total?.amount ?? f.price?.amount ?? f.amount ?? f.price;
                            const p = f.miles ?? f.points ?? f.pointsRequired;
                            if (m != null || p != null) fos.push({ type: f.productClass?.name || 'Tarifa', money: m ?
                                    Number(m) : null, miles: p ? Number(p) : null, costTax: f.taxes ?? null });
                        }
                    }
                    if (!fos.length && Array.isArray(item.fareOptions)) {
                        for (const fo of item.fareOptions) {
                            fos.push({ type: fo.fareType || 'Tarifa', money: fo.money ?? null, miles: fo.miles ?? null,
                                costTax: fo.costTax ?? null });
                        }
                    }
                    if (!fos.length) {
                        const m = item.price?.amount ?? item.price?.total ?? item.price ?? item.amount;
                        const p = item.miles ?? item.points;
                        if (m || p) fos.push({ type: 'Tarifa', money: m ? Number(m) : null, miles: p ? Number(p) : null,
                            costTax: null });
                    }
                    if (!fos.length) continue;

                    const f = this._makeFlight(cfg, {
                        from: first.origin || first.from || first.departureAirport || '?',
                        to: last.destination || last.to || last.arrivalAirport || '?',
                        dep: this._fmtTime(first.departureTime || first.departure || first.depTime),
                        arr: this._fmtTime(last.arrivalTime || last.arrival || last.arrTime),
                        durationStr: this._fmtDuration(item.duration || first.duration),
                        stops: Math.max(0, segs.length - 1),
                        flightNumbers: segs.map(s => s.flightNumber || s.flight || s.number).filter(Boolean),
                        operatingAirline: this._airlineName(carrier),
                        operatingCode: carrier,
                        operatingColor: this._airlineColor(carrier),
                        fareOptions: fos,
                    });
                    if (f) flights.push(f);
                }
                return flights;
            },

            // ── SMILES: data.offers[] ──
            _parseSmiles(data, cfg) {
                const flights = [];
                const offers = data.offers || [];
                for (const o of offers) {
                    const carrier = this._extractCarrier(o.segments || []) || 'G3';
                    const allFos = (o.fareOptions || []).map(fo => ({
                        type: fo.fareType || 'Tarifa',
                        money: fo.money != null ? Number(fo.money) : null,
                        miles: fo.miles != null ? Number(fo.miles) : null,
                        costTax: fo.costTax != null ? Number(fo.costTax) : null,
                    }));
                    const fos = allFos.filter(fo => fo.type === 'SMILES' || fo.type === 'SMILES_CLUB');
                    if (!fos.length) continue;

                    const f = this._makeFlight(cfg, {
                        from: o.departureAirport,
                        to: o.arrivalAirport,
                        dep: this._fmtTime(o.departureTime),
                        arr: this._fmtTime(o.arrivalTime),
                        stops: o.stops || 0,
                        flightNumbers: (o.segments || []).map(s => s.flightNumber).filter(Boolean),
                        operatingAirline: this._airlineName(carrier),
                        operatingCode: carrier,
                        operatingColor: this._airlineColor(carrier),
                        fareOptions: fos,
                    });
                    if (f) flights.push(f);
                }
                return flights;
            },

            // ── GOL: data.itineraries[] ──
            _parseGol(data, cfg) {
                const flights = [];
                for (const it of data.itineraries || []) {
                    const segs = it.segments || [];
                    if (!segs.length) continue;
                    const carrier = this._extractCarrier(segs) || 'G3';

                    const fos = [];
                    if (Array.isArray(it.offers)) {
                        for (const o of it.offers) {
                            if (o.price || o.amount) fos.push({ type: o.name || 'Tarifa', money: Number(o.price || o
                                    .amount), miles: null, costTax: null });
                        }
                    }
                    if (!fos.length && (it.price || it.total)) {
                        fos.push({ type: 'Tarifa', money: Number(it.price || it.total), miles: null, costTax: null });
                    }
                    if (!fos.length && data.cheapestOffer) {
                        const co = data.cheapestOffer;
                        if (co.price) fos.push({ type: 'Menor Tarifa', money: Number(co.price), miles: null,
                            costTax: null });
                    }
                    if (!fos.length) continue;

                    const f = this._makeFlight(cfg, {
                        from: it.origin || it.from || segs[0].origin || '?',
                        to: it.destination || it.to || segs[segs.length - 1].destination || '?',
                        dep: this._fmtTime(segs[0].departure || segs[0].departureTime),
                        arr: this._fmtTime(segs[segs.length - 1].arrival || segs[segs.length - 1].arrivalTime),
                        durationStr: this._fmtDuration(it.duration),
                        stops: it.stops ?? Math.max(0, segs.length - 1),
                        flightNumbers: segs.map(s => s.flightNumber).filter(Boolean),
                        aircraft: segs[0].equipment || null,
                        operatingAirline: this._airlineName(carrier),
                        operatingCode: carrier,
                        operatingColor: this._airlineColor(carrier),
                        fareOptions: fos,
                    });
                    if (f) flights.push(f);
                }
                return flights;
            },

            // ── GENÉRICO ──
            _parseGeneric(data, cfg) {
                let items = null;
                const keys = ['trips', 'offers', 'results', 'items', 'flights', 'itineraries', 'journeys'];
                for (const k of keys) { if (Array.isArray(data[k])) { items = data[k]; break; } }
                if (!items) {
                    for (const k of keys) { if (data[k]?.flights) { items = data[k].flights; break; } }
                }
                if (!items) return [];

                const flights = [];
                for (const item of items) {
                    const segs = item.segments || [];
                    const carrier = this._extractCarrier(segs);
                    const fos = [];
                    if (Array.isArray(item.fares)) {
                        for (const f of item.fares) {
                            const m = f.total?.amount ?? f.price?.amount ?? f.amount;
                            if (m != null) fos.push({ type: f.productClass?.name || 'Tarifa', money: Number(m),
                                miles: null, costTax: null });
                        }
                    }
                    if (!fos.length && Array.isArray(item.fareOptions)) {
                        for (const fo of item.fareOptions) {
                            fos.push({ type: fo.fareType || 'Tarifa', money: fo.money ?? null, miles: fo.miles ?? null,
                                costTax: fo.costTax ?? null });
                        }
                    }
                    if (!fos.length) {
                        const m = item.price ?? item.amount ?? item.total?.amount;
                        if (m) fos.push({ type: 'Tarifa', money: Number(m), miles: null, costTax: null });
                    }
                    if (!fos.length) continue;

                    const f = this._makeFlight(cfg, {
                        from: item.origin || item.from || segs[0]?.origin || '?',
                        to: item.destination || item.to || segs[segs.length - 1]?.destination || '?',
                        dep: this._fmtTime(item.departure || item.departureTime || segs[0]?.departure),
                        arr: this._fmtTime(item.arrival || item.arrivalTime || segs[segs.length - 1]?.arrival),
                        durationStr: this._fmtDuration(item.duration),
                        stops: item.stopsCount ?? item.stops ?? Math.max(0, segs.length - 1),
                        flightNumbers: segs.map(s => s.flightNumber).filter(Boolean),
                        operatingAirline: this._airlineName(carrier),
                        operatingCode: carrier,
                        operatingColor: this._airlineColor(carrier),
                        fareOptions: fos,
                    });
                    if (f) flights.push(f);
                }
                return flights;
            },
        };

        // ╔══════════════════════════════════════════════════════════════╗
        // ║  UI — Renderização e Eventos                                ║
        // ╚══════════════════════════════════════════════════════════════╝
        const UI = {
            initToggleBars() {
                document.querySelectorAll('#tripTypeBar .toggle-btn').forEach(btn => {
                    btn.addEventListener('click', () => App.setTripType(btn.dataset.type));
                });
                document.querySelectorAll('#regionBar .toggle-btn').forEach(btn => {
                    btn.addEventListener('click', () => App.setRegion(btn.dataset.region));
                });
                document.querySelectorAll('#searchTypeGroup .filter-btn').forEach(btn => {
                    btn.addEventListener('click', () => App.setSearchType(btn.dataset.type));
                });
                // Modal close
                document.querySelector('.btn-close-modal').addEventListener('click', () => {
                    document.getElementById('whatsappModal').classList.remove('show');
                });
                document.getElementById('whatsappModal').addEventListener('click', (e) => {
                    if (e.target.id === 'whatsappModal') document.getElementById('whatsappModal').classList
                        .remove('show');
                });
                // WhatsApp buttons
                document.getElementById('btnCopy').addEventListener('click', () => {
                    navigator.clipboard.writeText(document.getElementById('msgPreview').textContent).then(() => {
                            App.showToast('📋 Copiado!');
                        })
                        .catch(() => App.showToast('❌ Erro ao copiar'));
                });
                document.getElementById('btnWhatsapp').addEventListener('click', () => App.openWhatsappModal());
                // Summary bar
                document.getElementById('summaryBar').addEventListener('click', (e) => {
                    if (e.target.id === 'btnWhatsapp') App.openWhatsappModal();
                });
            },

            initAirportSelectors() {
                ['from', 'to'].forEach(type => {
                    const input = document.getElementById(`${type}Airport`);
                    const wrap = input.parentElement;
                    const dropdown = document.getElementById(`${type}Dropdown`);
                    const clearBtn = wrap.querySelector('.clear-btn');

                    input.addEventListener('input', () => this._filterAirports(type));
                    input.addEventListener('focus', () => {
                        this._filterAirports(type);
                        setTimeout(() => dropdown.classList.add('show'), 50);
                    });
                    input.addEventListener('blur', () => setTimeout(() => dropdown.classList.remove('show'),
                        180));

                    clearBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        input.value = '';
                        wrap.classList.remove('has-value');
                        dropdown.classList.remove('show');
                        if (type === 'from') State.fromAirport = null;
                        else State.toAirport = null;
                        input.focus();
                    });
                });
                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.airport-selector')) {
                        document.getElementById('fromDropdown').classList.remove('show');
                        document.getElementById('toDropdown').classList.remove('show');
                    }
                });
            },

            _filterAirports(type) {
                const input = document.getElementById(`${type}Airport`);
                const wrap = input.parentElement;
                const dropdown = document.getElementById(`${type}Dropdown`);
                const query = input.value.trim();
                wrap.classList.toggle('has-value', !!query);

                let airports = CONFIG.AIRPORTS[State.region] || CONFIG.AIRPORTS['nacional'];
                // Para origem internacional, inclui aeroportos nacionais também
                if (type === 'from' && State.region === 'internacional') {
                    airports = [...CONFIG.AIRPORTS['nacional'], ...CONFIG.AIRPORTS['internacional']];
                }

                const q = query.toUpperCase();
                const filtered = !q ? airports : airports.filter(a =>
                    a.iata.includes(q) || a.city.toUpperCase().includes(q) || a.name.toUpperCase().includes(q));

                if (filtered.length === 0) {
                    dropdown.innerHTML = '<div class="no-results">Nenhum aeroporto encontrado</div>';
                } else {
                    let html =
                        `<div class="airport-dropdown-header">${filtered.length} aeroportos</div>`;
                    for (const ap of filtered.slice(0, 20)) {
                        html += `
                    <div class="airport-item" data-iata="${ap.iata}" data-type="${type}">
                      <span class="iata">${ap.iata}</span>
                      <div class="info"><div class="city">${ap.city}</div><div class="name">${ap.name}</div></div>
                    </div>`;
                    }
                    dropdown.innerHTML = html;

                    // Event listeners nos itens
                    dropdown.querySelectorAll('.airport-item').forEach(item => {
                        item.addEventListener('mousedown', (e) => {
                            e.preventDefault();
                            const iata = item.dataset.iata;
                            const t = item.dataset.type;
                            const ap = airports.find(a => a.iata === iata);
                            const inputEl = document.getElementById(`${t}Airport`);
                            inputEl.value = `${iata} - ${ap ? ap.city : ''}`;
                            inputEl.parentElement.classList.add('has-value');
                            if (t === 'from') State.fromAirport = { iata, city: ap?.city,
                                name: ap?.name };
                            else State.toAirport = { iata, city: ap?.city, name: ap?.name };
                            dropdown.classList.remove('show');
                        });
                    });
                }
                dropdown.classList.add('show');
            },

            renderAirlineToggles() {
                const container = document.getElementById('airlineToggles');
                container.innerHTML = '';
                for (const [id, cfg] of Object.entries(CONFIG.AIRLINES)) {
                    const sel = State.selectedAirlines.has(id);
                    const compat = State.isCompatible(id);
                    const btn = document.createElement('button');
                    btn.className = ['airline-chip', sel ? 'active' : '', compat ? '' : 'incompatible'].join(' ')
                        .trim();
                    if (compat) btn.onclick = () => App.toggleAirline(id);
                    else btn.title = 'Incompatível com o tipo de busca selecionado';
                    btn.innerHTML = `<span class="dot" style="background:${cfg.color}"></span>${cfg.label}`;
                    container.appendChild(btn);
                }
            },

            updateStatusBar() {
                const bar = document.getElementById('statusBar');
                const targets = State.getActiveTargets();
                bar.className = 'status-bar';
                if (targets.length === 0) {
                    bar.textContent = '⚠️ Nenhuma cia aérea compatível — ajuste o tipo de busca';
                    bar.classList.add('warning');
                } else {
                    const tipo = State.tripType === 'oneway' ? '➡️ Ida' : '🔄 Ida/Volta';
                    const reg = State.region === 'nacional' ? '🇧🇷' : '🌎';
                    const st = State.searchType === 'money' ? '💰' : State.searchType === 'points' ? '🎯' : '🔄';
                    bar.textContent =
                        `${tipo} | ${reg} | ${st} | ${targets.map(t=>t.label).join(', ')}`;
                    bar.classList.add('ok');
                }
            },

            applyTripTypeUI() {
                document.getElementById('retDateField').style.display = State.tripType === 'oneway' ? 'none' : '';
                if (State.tripType === 'oneway') {
                    State.selectedVolta = null;
                    State.allFlights.volta = [];
                }
            },

            showLoading(msg) {
                document.getElementById('loadingOverlay').classList.add('show');
                document.getElementById('loadingText').textContent = msg || 'Buscando voos...';
            },

            hideLoading() {
                document.getElementById('loadingOverlay').classList.remove('show');
            },

            renderResults() {
                const container = document.getElementById('tripColumns');
                const single = State.tripType === 'oneway';
                container.className = 'trip-columns' + (single ? ' single' : '');

                let html = this._buildColumn('ida', '🟢 Ida', State.allFlights.ida, State.errors.filter(e => e
                    .direction === 'ida'));
                if (!single) {
                    html += this._buildColumn('volta', '🔴 Volta', State.allFlights.volta, State.errors.filter(e => e
                        .direction === 'volta'));
                }
                container.innerHTML = html;

                // Event listeners nos cards
                container.querySelectorAll('.flight-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const dir = card.dataset.direction;
                        const fid = card.dataset.flightId;
                        App.selectFlight(dir, fid);
                    });
                });

                document.getElementById('resultsSection').classList.add('show');
                document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth' });
                this.updateSummary();
            },

            _buildColumn(dir, label, flights, errors) {
                let body = '';
                if (!flights.length) {
                    body +=
                    '<div class="empty-state">Nenhum voo encontrado para esta data</div>';
                    for (const e of errors || []) {
                        body +=
                            `<div class="error-card">⚠️ <strong>${e.label}</strong>: ${e.reason}</div>`;
                    }
                } else {
                    for (const f of flights) {
                        body += this._buildFlightCard(f, dir);
                    }
                }
                return `<div class="trip-column">
              <div class="trip-column-header ${dir}">${label} <span style="font-weight:400;font-size:0.75rem;margin-left:auto;">${flights.length} voo(s)</span></div>
              <div class="trip-column-body">${body}</div>
            </div>`;
            },

            _buildFlightCard(f, dir) {
                const direct = f.stops === 0;
                const stopsBadge = direct ?
                    '<span class="badge badge-direct">Direto</span>' :
                    `<span class="badge badge-stops">${f.stops} parada(s)</span>`;
                const fnBadge = f.flightNumbers.length ?
                    `<span class="badge badge-flight">✈️ ${f.flightNumbers.join(', ')}</span>` : '';
                const acBadge = f.aircraft ? `<span class="badge badge-fare">${f.aircraft}</span>` : '';

                // Preço principal (menor)
                const best = f.fareOptions[0] || {};
                let priceHtml = '';
                if (best.money != null) priceHtml +=
                    `<span class="price-money">R$ ${best.money.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}</span>`;
                if (best.miles != null) priceHtml +=
                    `<span class="price-points">${best.miles.toLocaleString('pt-BR')} pts</span>`;
                if (best.costTax != null) priceHtml +=
                    `<span class="price-tax">+ R$ ${Number(best.costTax).toFixed(2)} taxas</span>`;

                // Tabela de tarifas (se múltiplas)
                let fareTable = '';
                if (f.fareOptions.length > 1) {
                    let th = '<tr><th>Tipo</th>';
                    const shM = f.fareOptions.some(fo => fo.money != null);
                    const shP = f.fareOptions.some(fo => fo.miles != null);
                    const shT = f.fareOptions.some(fo => fo.costTax != null);
                    if (shM) th += '<th>💰 Valor</th>';
                    if (shP) th += '<th>🎯 Pontos</th>';
                    if (shT) th += '<th>🧾 Taxas</th>';
                    th += '</tr>';

                    let tb = '';
                    for (let i = 0; i < f.fareOptions.length; i++) {
                        const fo = f.fareOptions[i];
                        const cls = i === 0 ? 'best-fare' : '';
                        tb += `<tr class="${cls}"><td>${fo.type}</td>`;
                        if (shM) tb +=
                            `<td>${fo.money!=null?'<strong>R$ '+fo.money.toFixed(2)+'</strong>':'—'}</td>`;
                        if (shP) tb +=
                            `<td>${fo.miles!=null?'<strong>'+fo.miles.toLocaleString('pt-BR')+'</strong>':'—'}</td>`;
                        if (shT) tb +=
                            `<td>${fo.costTax!=null?'<span class="badge badge-tax">+R$ '+Number(fo.costTax).toFixed(2)+'</span>':'—'}</td>`;
                        tb += '</tr>';
                    }
                    fareTable =
                        `<table class="fare-table"><thead>${th}</thead><tbody>${tb}</tbody></table>`;
                }

                const isDiff = f.operatingAirline && f.operatingAirline !== f.sourceAirline;
                const opLabel = f.operatingAirline || f.sourceAirline;

                const isSelected = (dir === 'ida' && State.selectedIda?.id === f.id) ||
                    (dir === 'volta' && State.selectedVolta?.id === f.id);

                return `
            <div class="flight-card${isSelected?' selected':''}" data-direction="${dir}" data-flight-id="${f.id}">
              <div class="check">✓</div>
              <div class="top-row">
                <span class="op-airline-tag" style="background:${f.operatingColor}">✈️ ${opLabel}</span>
                ${isDiff ? `<span class="src-badge">via ${f.sourceAirline}</span>` : `<span class="src-badge" style="background:${f.sourceColor};color:#fff;">${f.sourceAirline}</span>`}
              </div>
              <div class="route">${f.from} → ${f.to}</div>
              <div class="times">🕐 ${f.dep||'--:--'} → ${f.arr||'--:--'} &nbsp;|&nbsp; ⏱ ${f.durationStr}</div>
              <div class="meta">${stopsBadge}${fnBadge}${acBadge}</div>
              <div class="prices">${priceHtml}</div>
              ${fareTable}
            </div>`;
            },

            updateSummary() {
                const bar = document.getElementById('summaryBar');
                const wp = document.getElementById('btnWhatsapp');
                const hasIda = !!State.selectedIda;
                const hasVolta = State.tripType === 'roundtrip' && !!State.selectedVolta;
                const required = State.tripType === 'roundtrip' ? (hasIda && hasVolta) : hasIda;

                if (!hasIda && !hasVolta) { bar.classList.remove('show'); return; }
                bar.classList.add('show');

                document.getElementById('sumIdaItem').style.display = hasIda ? '' : 'none';
                document.getElementById('sumVoltaItem').style.display = hasVolta ? '' : 'none';
                if (hasIda) document.getElementById('sumIda').textContent = this._fmtSummary(State.selectedIda);
                if (hasVolta) document.getElementById('sumVolta').textContent = this._fmtSummary(State.selectedVolta);

                let totalM = 0,
                    totalP = 0;
                if (State.selectedIda?.fareOptions?.[0]?.money) totalM += State.selectedIda.fareOptions[0].money;
                if (State.selectedIda?.fareOptions?.[0]?.miles) totalP += State.selectedIda.fareOptions[0].miles;
                if (State.selectedVolta?.fareOptions?.[0]?.money) totalM += State.selectedVolta.fareOptions[0].money;
                if (State.selectedVolta?.fareOptions?.[0]?.miles) totalP += State.selectedVolta.fareOptions[0].miles;
                let ts = '';
                if (totalM > 0) ts += `R$ ${totalM.toLocaleString('pt-BR',{minimumFractionDigits:2})}`;
                if (totalP > 0) ts += (ts ? ' + ' : '') + `${totalP.toLocaleString('pt-BR')} pts`;
                document.getElementById('sumTotal').textContent = ts || '—';

                wp.disabled = !required;
                wp.textContent = required ? '💬 WhatsApp' :
                    (State.tripType === 'roundtrip' ? '⚠️ Selecione ida E volta' : '⚠️ Selecione um voo');
            },

            _fmtSummary(f) {
                const fo = f.fareOptions[0] || {};
                const parts = [f.operatingAirline, `${f.from}→${f.to}`, f.dep || '--:--'];
                if (fo.money) parts.push(`R$${fo.money.toFixed(2)}`);
                if (fo.miles) parts.push(`${fo.miles.toLocaleString('pt-BR')}pts`);
                return parts.join(' | ');
            },
        };

        // ╔══════════════════════════════════════════════════════════════╗
        // ║  APP — Controle Central                                    ║
        // ╚══════════════════════════════════════════════════════════════╝
        const App = {
            init() {
                State.init();
            },

            setTripType(type) {
                State.tripType = type;
                document.querySelectorAll('#tripTypeBar .toggle-btn').forEach(b =>
                    b.classList.toggle('active', b.dataset.type === type));
                UI.applyTripTypeUI();
                UI.updateStatusBar();
            },

            setRegion(region) {
                State.region = region;
                document.querySelectorAll('#regionBar .toggle-btn').forEach(b =>
                    b.classList.toggle('active', b.dataset.region === region));
                // Limpa seleções de aeroporto
                ['from', 'to'].forEach(t => {
                    const el = document.getElementById(`${t}Airport`);
                    el.value = '';
                    el.parentElement.classList.remove('has-value');
                });
                State.fromAirport = null;
                State.toAirport = null;
                UI.updateStatusBar();
            },

            setSearchType(type) {
                State.searchType = type;
                document.querySelectorAll('#searchTypeGroup .filter-btn').forEach(b =>
                    b.classList.toggle('active', b.dataset.type === type));
                UI.renderAirlineToggles();
                UI.updateStatusBar();
            },

            toggleAirline(id) {
                if (State.selectedAirlines.has(id)) State.selectedAirlines.delete(id);
                else State.selectedAirlines.add(id);
                UI.renderAirlineToggles();
                UI.updateStatusBar();
            },

            saveApiKey() {
                const val = document.getElementById('apiKeyInput').value.trim();
                State.apiKey = val;
                localStorage.setItem('geckoApiKey', val);
                if (val) {
                    State._updateApiStatus('configured');
                    this.showToast('✅ Chave salva!');
                } else {
                    State._updateApiStatus('empty');
                    this.showToast('⚠️ Chave removida');
                }
            },

            async testApi() {
                if (!State.apiKey) { this.showToast('⚠️ Insira a chave primeiro'); return; }
                State._updateApiStatus('testing');
                try {
                    await API.testConnection();
                    State._updateApiStatus('ok');
                    this.showToast('✅ Conexão OK!');
                } catch (e) {
                    State._updateApiStatus('error');
                    this.showToast(`❌ ${e.message.substring(0, 80)}`);
                }
            },

            async doSearch() {
                const targets = State.getActiveTargets();
                if (targets.length === 0) { this.showToast('⚠️ Nenhuma cia compatível selecionada'); return; }
                if (!State.apiKey) { this.showToast('⚠️ Configure sua chave GeckoAPI'); return; }

                const fromIata = State.getIata('from');
                const toIata = State.getIata('to');
                const depDate = document.getElementById('depDate').value;
                const retDate = document.getElementById('retDate').value;
                const adults = parseInt(document.getElementById('numAdults').value) || 1;

                if (!fromIata || !toIata) { this.showToast('⚠️ Selecione origem e destino'); return; }
                if (!depDate) { this.showToast('⚠️ Selecione a data de ida'); return; }
                if (fromIata === toIata) { this.showToast('⚠️ Origem e destino iguais'); return; }

                const btn = document.getElementById('btnSearch');
                btn.disabled = true;
                btn.textContent = '⏳ Buscando...';

                State.allFlights = { ida: [], volta: [] };
                State.errors = [];
                State.selectedIda = null;
                State.selectedVolta = null;
                State.debugLogs = [];
                document.getElementById('debugPanel').textContent = '';

                UI.showLoading(`Consultando ${targets.length} cia(s): ${targets.map(t=>t.label).join(', ')}...`);
                UI.updateStatusBar();

                try {
                    const result = await API.searchAll(fromIata, toIata, depDate, retDate, adults);
                    State.allFlights = result.flights;
                    State.errors = result.errors;

                    // Ordena por preço
                    const sortFn = (a, b) => {
                        const va = a.fareOptions[0]?.money ?? a.fareOptions[0]?.miles ?? Infinity;
                        const vb = b.fareOptions[0]?.money ?? b.fareOptions[0]?.miles ?? Infinity;
                        return va - vb;
                    };
                    State.allFlights.ida.sort(sortFn);
                    State.allFlights.volta.sort(sortFn);

                    UI.hideLoading();
                    UI.renderResults();
                } catch (e) {
                    UI.hideLoading();
                    this.showToast(`❌ ${e.message.substring(0, 100)}`);
                    State.log(`ERRO FATAL: ${e.message}`);
                } finally {
                    btn.disabled = false;
                    btn.textContent = '🔍 Buscar Voos';
                }
            },

            selectFlight(dir, flightId) {
                const flight = State.allFlights[dir].find(f => f.id === flightId);
                if (!flight) return;
                if (dir === 'ida') {
                    State.selectedIda = (State.selectedIda?.id === flightId) ? null : flight;
                } else {
                    State.selectedVolta = (State.selectedVolta?.id === flightId) ? null : flight;
                }
                // Atualiza visual
                document.querySelectorAll(`.flight-card[data-direction="${dir}"]`).forEach(card => {
                    const fid = card.dataset.flightId;
                    const selId = dir === 'ida' ? State.selectedIda?.id : State.selectedVolta?.id;
                    card.classList.toggle('selected', fid === selId);
                });
                UI.updateSummary();
            },

            getFutureDate(days) {
                const d = new Date();
                d.setDate(d.getDate() + days);
                return d.toISOString().split('T')[0];
            },

            openWhatsappModal() {
                const msg = this._buildWhatsappMsg();
                document.getElementById('msgPreview').textContent = msg;
                document.getElementById('btnSendWa').href =
                    `https://wa.me/?text=${encodeURIComponent(msg)}`;
                document.getElementById('whatsappModal').classList.add('show');
            },

            _buildWhatsappMsg() {
                let m = '✈️ *Cotação de Voos*\n\n';
                const depD = document.getElementById('depDate').value.split('-').reverse().join('/');

                const add = (label, f, date) => {
                    if (!f) return;
                    const fo = f.fareOptions[0] || {};
                    m += `${label}: ${f.from} → ${f.to}\n`;
                    m +=
                        `   📅 ${date} | 🕐 ${f.dep||'--:--'} → ${f.arr||'--:--'} | ${f.durationStr}\n`;
                    m +=
                    `   ✈️ Operado: ${f.operatingAirline} | ${f.stops===0?'Direto':f.stops+' parada(s)'}\n`;
                    if (fo.money) m += `   💰 R$ ${fo.money.toFixed(2)}\n`;
                    if (fo.miles) m += `   🎯 ${fo.miles.toLocaleString('pt-BR')} pts\n`;
                    if (fo.costTax) m += `   🧾 Taxas: R$ ${Number(fo.costTax).toFixed(2)}\n`;
                    if (f.flightNumbers?.length) m += `   🔢 Voo: ${f.flightNumbers.join(' / ')}\n`;
                    m += '\n';
                };

                add('🟢 *IDA*', State.selectedIda, depD);
                if (State.tripType === 'roundtrip') {
                    const retD = document.getElementById('retDate').value.split('-').reverse().join('/');
                    add('🔴 *VOLTA*', State.selectedVolta, retD);
                }

                let tM = 0,
                    tP = 0;
                [State.selectedIda, State.selectedVolta].forEach(f => {
                    if (f?.fareOptions?.[0]?.money) tM += f.fareOptions[0].money;
                    if (f?.fareOptions?.[0]?.miles) tP += f.fareOptions[0].miles;
                });
                if (tM > 0 || tP > 0) {
                    m += '💵 *TOTAL*: ';
                    if (tM > 0) m += `R$ ${tM.toFixed(2)}`;
                    if (tP > 0) m += `${tM>0?' + ':''}${tP.toLocaleString('pt-BR')} pts`;
                    m += '\n\n';
                }
                m +=
                    `🔗 ${State.selectedIda?.from||'?'} ↔ ${State.selectedIda?.to||'?'} | ${new Date().toLocaleDateString('pt-BR')}`;
                return m;
            },

            toggleDebug() {
                CONFIG.DEBUG = !CONFIG.DEBUG;
                const panel = document.getElementById('debugPanel');
                if (CONFIG.DEBUG) {
                    panel.textContent = State.debugLogs.slice(-30).join('\n');
                    panel.classList.add('show');
                    document.getElementById('debugToggle').textContent = '🐛 Ocultar Debug';
                } else {
                    panel.classList.remove('show');
                    document.getElementById('debugToggle').textContent = '🐛 Debug';
                }
            },

            showToast(msg) {
                const t = document.getElementById('toast');
                t.textContent = msg;
                t.classList.add('show');
                clearTimeout(t._tid);
                t._tid = setTimeout(() => t.classList.remove('show'), 2800);
            },
        };

        // ═══════════════════════════════════════════════════════════════
        //  BOOT
        // ═══════════════════════════════════════════════════════════════
        document.addEventListener('DOMContentLoaded', () => App.init());

        // Expor funções globais para onclick no HTML
        window.App = App;
    </script>
</body>
</html>
