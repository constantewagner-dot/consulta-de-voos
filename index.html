<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✈️ Consulta de Voos</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card: #fff;
            --border: #e0e0e0;
            --text: #1a1a2e;
            --sub: #666;
            --primary: #1a73e8;
            --primary-hover: #1557b0;
            --success: #0d8a3e;
            --danger: #d93025;
            --warning: #e67e22;
            --purple: #6B2D8B;
            --radius: 12px;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            padding: 14px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-logo {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .header-logo span {
            color: #4fc3f7;
        }
        .header-badge {
            background: #ffffff22;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.72rem;
            letter-spacing: 0.5px;
        }
        .api-key-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .api-key-wrap input {
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #ffffff44;
            background: #ffffff11;
            color: #fff;
            font-size: 0.78rem;
            width: 230px;
            outline: none;
        }
        .api-key-wrap input::placeholder {
            color: #ffffff88;
        }
        .api-key-wrap input:focus {
            border-color: #4fc3f7;
        }
        .btn-sm {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.72rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .btn-sm.ghost {
            background: #ffffff22;
            color: #fff;
        }
        .btn-sm.ghost:hover {
            background: #ffffff33;
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ── TOGGLES ── */
        .toggles-row {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .toggle-bar {
            display: flex;
            gap: 0;
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            width: fit-content;
        }
        .toggle-btn {
            padding: 10px 24px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--sub);
            transition: all 0.25s;
            white-space: nowrap;
        }
        .toggle-btn.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 2px 8px rgba(26, 115, 232, 0.35);
        }
        .toggle-btn:hover:not(.active) {
            background: #f5f7fa;
            color: var(--text);
        }

        .search-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 22px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }
        .search-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .search-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            min-width: 135px;
        }
        .search-field label {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--sub);
        }
        .search-field select,
        .search-field input[type="date"] {
            padding: 10px 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 0.92rem;
            outline: none;
            transition: border-color 0.2s;
            background: #fafafa;
        }
        .search-field select:focus,
        .search-field input[type="date"]:focus {
            border-color: var(--primary);
            background: #fff;
        }
        .btn-search {
            padding: 11px 28px;
            background: var(--success);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            align-self: flex-end;
        }
        .btn-search:hover {
            background: #0b7532;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(13, 138, 62, 0.3);
        }
        .btn-search:disabled {
            background: #aaa;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .airport-selector {
            position: relative;
        }
        .airport-input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        .airport-input-wrap input {
            width: 100%;
            padding: 10px 30px 10px 36px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 0.92rem;
            font-weight: 600;
            outline: none;
            transition: all 0.2s;
            background: #fafafa;
            text-transform: uppercase;
        }
        .airport-input-wrap input:focus {
            border-color: var(--primary);
            background: #fff;
        }
        .airport-input-wrap .search-icon {
            position: absolute;
            left: 11px;
            font-size: 0.95rem;
            color: #999;
            pointer-events: none;
        }
        .airport-input-wrap .clear-btn {
            position: absolute;
            right: 6px;
            background: none;
            border: none;
            font-size: 1.2rem;
            color: #bbb;
            cursor: pointer;
            padding: 4px;
            display: none;
            line-height: 1;
        }
        .airport-input-wrap .clear-btn:hover {
            color: #555;
        }
        .airport-input-wrap.has-value .clear-btn {
            display: block;
        }
        .airport-dropdown {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: #fff;
            border: 2px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.14);
            max-height: 340px;
            overflow-y: auto;
            z-index: 50;
            display: none;
        }
        .airport-dropdown.show {
            display: block;
        }
        .airport-dropdown-header {
            padding: 10px 14px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: #888;
            border-bottom: 1px solid #f0f0f0;
            background: #fafafa;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        .airport-item {
            padding: 10px 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.12s;
        }
        .airport-item:hover {
            background: #f0f4ff;
        }
        .airport-item .iata-code {
            font-weight: 800;
            font-size: 1rem;
            color: var(--primary);
            min-width: 42px;
        }
        .airport-item .airport-info {
            flex: 1;
            min-width: 0;
        }
        .airport-item .city-name {
            font-weight: 600;
            font-size: 0.88rem;
        }
        .airport-item .airport-name {
            font-size: 0.73rem;
            color: var(--sub);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .airport-dropdown .no-results {
            padding: 22px;
            text-align: center;
            color: #aaa;
            font-size: 0.82rem;
        }

        .filters-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 16px;
            justify-content: center;
        }
        .search-type-toggles {
            display: flex;
            gap: 0;
            background: var(--card);
            border-radius: 8px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .search-type-btn {
            padding: 8px 18px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--sub);
            transition: all 0.2s;
            white-space: nowrap;
        }
        .search-type-btn.active {
            background: var(--purple);
            color: #fff;
        }
        .search-type-btn:hover:not(.active) {
            background: #f5f0fa;
        }
        .airline-toggles {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .airline-toggle {
            padding: 6px 14px;
            border: 2px solid var(--border);
            border-radius: 20px;
            background: var(--card);
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .airline-toggle.active {
            border-color: #333;
            background: #fff;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
        }
        .airline-toggle.incompatible {
            opacity: 0.35;
            cursor: not-allowed;
            text-decoration: line-through;
        }
        .airline-toggle .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-bar {
            text-align: center;
            font-size: 0.78rem;
            padding: 6px;
            color: var(--sub);
            min-height: 24px;
        }
        .status-bar.warning {
            color: var(--danger);
        }
        .status-bar.ok {
            color: var(--success);
        }

        .loading-overlay {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .loading-overlay.show {
            display: block;
        }
        .spinner {
            width: 46px;
            height: 46px;
            border: 4px solid #e0e0e0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 14px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .results-section {
            display: none;
        }
        .results-section.show {
            display: block;
        }
        .trip-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }
        .trip-columns.single {
            grid-template-columns: 1fr;
            max-width: 680px;
            margin: 0 auto;
        }
        @media (max-width: 768px) {
            .trip-columns {
                grid-template-columns: 1fr;
            }
        }
        .trip-column {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .trip-column-header {
            padding: 12px 16px;
            font-weight: 700;
            font-size: 0.92rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 2px solid #f0f0f0;
        }
        .trip-column-header.ida {
            background: #e3f2fd;
            color: #1565c0;
        }
        .trip-column-header.volta {
            background: #fce4ec;
            color: #c62828;
        }
        .trip-column-body {
            max-height: 600px;
            overflow-y: auto;
            padding: 8px;
        }
        .trip-column-body .empty {
            text-align: center;
            padding: 36px 20px;
            color: #999;
            font-size: 0.85rem;
        }
        .flight-card {
            border: 2px solid #f0f0f0;
            border-radius: 10px;
            padding: 14px;
            margin: 6px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            background: #fff;
        }
        .flight-card:hover {
            border-color: #ccc;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        .flight-card.selected {
            border-color: var(--success);
            background: #f6fff6;
            box-shadow: 0 0 0 2px rgba(13, 138, 62, 0.15);
        }
        .flight-card .select-indicator {
            position: absolute;
            top: 10px;
            right: 12px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: all 0.2s;
            color: transparent;
        }
        .flight-card.selected .select-indicator {
            background: var(--success);
            border-color: var(--success);
            color: #fff;
        }
        .flight-card .airline-tag {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 14px;
            font-size: 0.7rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }
        .flight-card .route-line {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 4px;
            letter-spacing: 0.3px;
        }
        .flight-card .time-line {
            color: var(--sub);
            font-size: 0.84rem;
            margin-bottom: 5px;
        }
        .flight-card .flight-meta {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 4px;
        }
        .flight-card .flight-meta .badge {
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .badge-direct {
            background: #e8f5e9;
            color: #0d8a3e;
        }
        .badge-stops {
            background: #fff3e0;
            color: #e67e22;
        }
        .badge-fare {
            background: #ede7f6;
            color: #6B2D8B;
        }
        .badge-flight {
            background: #e3f2fd;
            color: #1565c0;
        }
        .badge-tax {
            background: #fce4ec;
            color: #c62828;
        }
        .badge-club {
            background: #fff8e1;
            color: #f57f17;
        }
        .flight-card .price-area {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .flight-card .price-money {
            font-size: 1.35rem;
            font-weight: 800;
            color: #0d8a3e;
        }
        .flight-card .price-points {
            font-size: 0.9rem;
            font-weight: 700;
            color: #6B2D8B;
        }
        .flight-card .price-tax {
            font-size: 0.7rem;
            color: #c62828;
            font-weight: 600;
        }

        .fare-options-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 8px;
            font-size: 0.75rem;
        }
        .fare-options-table th {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #888;
            padding: 4px 8px;
            text-align: left;
            border-bottom: 1px solid #eee;
            background: #fafafa;
        }
        .fare-options-table td {
            padding: 5px 8px;
            border-bottom: 1px solid #f5f5f5;
            font-size: 0.78rem;
        }
        .fare-row.selected-fare {
            background: #e8f5e9;
            outline: 2px solid var(--success);
            border-radius: 4px;
        }

        .summary-bar {
            display: none;
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px 20px;
            margin-top: 16px;
            box-shadow: var(--shadow);
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .summary-bar.show {
            display: flex;
        }
        .summary-bar .summary-info {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            align-items: center;
        }
        .summary-bar .summary-info .item {
            font-size: 0.82rem;
        }
        .summary-bar .summary-info .item strong {
            font-size: 0.95rem;
        }
        .summary-total {
            font-size: 1.5rem;
            font-weight: 800;
            color: #0d8a3e;
        }
        .btn-whatsapp {
            padding: 11px 22px;
            background: #25D366;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-whatsapp:hover {
            background: #1ebe5b;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
        }
        .btn-whatsapp:disabled {
            background: #bbb;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal {
            background: #fff;
            border-radius: var(--radius);
            padding: 26px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal h3 {
            margin-bottom: 10px;
            font-size: 1.15rem;
        }
        .modal .msg-preview {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 14px;
            font-size: 0.82rem;
            line-height: 1.6;
            white-space: pre-wrap;
            font-family: 'Segoe UI', system-ui, sans-serif;
            max-height: 280px;
            overflow-y: auto;
            margin-bottom: 16px;
            border: 1px solid #e0e0e0;
        }
        .modal .btn-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn-copy,
        .btn-send-wa,
        .btn-close-modal {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.82rem;
        }
        .btn-copy {
            background: #333;
            color: #fff;
        }
        .btn-copy:hover {
            background: #555;
        }
        .btn-copy.copied {
            background: var(--success);
        }
        .btn-send-wa {
            background: #25D366;
            color: #fff;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .btn-send-wa:hover {
            background: #1ebe5b;
        }
        .btn-close-modal {
            background: #eee;
        }
        .btn-close-modal:hover {
            background: #ddd;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 11px 22px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.82rem;
            z-index: 300;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
        }

        @media (max-width: 600px) {
            .search-row {
                flex-direction: column;
            }
            .search-field {
                min-width: 100%;
            }
            .filters-row {
                flex-direction: column;
                align-items: stretch;
            }
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            .api-key-wrap input {
                width: 150px;
            }
            .toggles-row {
                flex-direction: column;
                align-items: center;
                gap: 8px;
            }
            .flight-card .price-area {
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-logo">✈️ Consulta de <span>Voos</span></div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
            <div class="api-key-wrap">
                <input type="password" id="apiKeyInput" placeholder="Chave da GeckoAPI" />
                <button class="btn-sm ghost" onclick="saveApiKey()" title="Salvar chave">💾</button>
                <button class="btn-sm ghost" onclick="testConnection()" title="Testar conexão">🔌</button>
            </div>
            <span class="header-badge" id="apiStatus">⚪ Não configurada</span>
        </div>
    </header>

    <div class="main-container">

        <div class="toggles-row">
            <div class="toggle-bar" id="tripTypeBar">
                <button class="toggle-btn active" onclick="setTripType('roundtrip')" data-type="roundtrip">🔄 Ida e Volta</button>
                <button class="toggle-btn" onclick="setTripType('oneway')" data-type="oneway">➡️ Apenas Ida</button>
            </div>
            <div class="toggle-bar" id="regionToggleBar">
                <button class="toggle-btn active" onclick="setRegion('nacional')" data-region="nacional">🇧🇷 Nacional</button>
                <button class="toggle-btn" onclick="setRegion('internacional')" data-region="internacional">🌎 Internacional</button>
            </div>
        </div>

        <div class="search-card" id="searchForm">
            <div class="search-row">
                <div class="search-field">
                    <label>🔵 Origem</label>
                    <div class="airport-selector" id="fromSelector">
                        <div class="airport-input-wrap">
                            <span class="search-icon">🔍</span>
                            <input type="text" id="fromAirport" placeholder="IATA ou cidade..." autocomplete="off" />
                            <button class="clear-btn" onclick="clearAirport('from')" type="button">×</button>
                        </div>
                        <div class="airport-dropdown" id="fromDropdown"></div>
                    </div>
                </div>
                <div class="search-field">
                    <label>🔴 Destino</label>
                    <div class="airport-selector" id="toSelector">
                        <div class="airport-input-wrap">
                            <span class="search-icon">🔍</span>
                            <input type="text" id="toAirport" placeholder="IATA ou cidade..." autocomplete="off" />
                            <button class="clear-btn" onclick="clearAirport('to')" type="button">×</button>
                        </div>
                        <div class="airport-dropdown" id="toDropdown"></div>
                    </div>
                </div>
                <div class="search-field">
                    <label>📅 Data de Ida</label>
                    <input type="date" id="depDate" />
                </div>
                <div class="search-field" id="returnDateField">
                    <label>📅 Data de Volta</label>
                    <input type="date" id="retDate" />
                </div>
                <div class="search-field" style="flex:0.45;min-width:75px;">
                    <label>👥 Adultos</label>
                    <select id="numAdults">
                        <option value="1">1</option>
                        <option value="2" selected>2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                    </select>
                </div>
                <button class="btn-search" id="btnSearch" onclick="doSearch()">🔍 Buscar</button>
            </div>
        </div>

        <div class="filters-row">
            <div class="search-type-toggles" id="searchTypeToggles">
                <button class="search-type-btn active" onclick="setSearchType('both')" data-type="both">🔄 Ambos</button>
                <button class="search-type-btn" onclick="setSearchType('money')" data-type="money">💰 Dinheiro</button>
                <button class="search-type-btn" onclick="setSearchType('points')" data-type="points">🎯 Pontos</button>
            </div>
            <div class="airline-toggles" id="airlineToggles"></div>
        </div>

        <div class="status-bar" id="statusBar"></div>

        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <p id="loadingText" style="color:#666;">Buscando voos...</p>
        </div>

        <div class="results-section" id="resultsSection">
            <div class="trip-columns" id="tripColumns"></div>
            <div class="summary-bar" id="summaryBar">
                <div class="summary-info">
                    <div class="item" id="summaryIdaItem" style="display:none;">🟢 <strong>Ida:</strong> <span id="summaryIda">—</span></div>
                    <div class="item" id="summaryVoltaItem" style="display:none;">🔴 <strong>Volta:</strong> <span id="summaryVolta">—</span></div>
                    <div class="summary-total" id="summaryTotal">R$ 0,00</div>
                </div>
                <button class="btn-whatsapp" id="btnWhatsapp" onclick="openWhatsappModal()" disabled>💬 WhatsApp</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="whatsappModal">
        <div class="modal">
            <h3>💬 Compartilhar Cotação</h3>
            <p style="font-size:0.82rem;color:#666;margin-bottom:10px;">Mensagem pronta para enviar:</p>
            <div class="msg-preview" id="msgPreview"></div>
            <div class="btn-row">
                <button class="btn-copy" id="btnCopy" onclick="copyMessage()">📋 Copiar</button>
                <a class="btn-send-wa" id="btnSendWa" href="#" target="_blank">📱 Enviar WhatsApp</a>
                <button class="btn-close-modal" onclick="closeWhatsappModal()">Fechar</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ═══════════════════════════════════════════════════════════
        //  AIRPORTS DATABASE
        // ═══════════════════════════════════════════════════════════
        const AIRPORTS_NACIONAL = [
            { iata: 'GRU', city: 'São Paulo', name: 'Guarulhos (GRU)', country: 'BR' },
            { iata: 'CGH', city: 'São Paulo', name: 'Congonhas (CGH)', country: 'BR' },
            { iata: 'VCP', city: 'Campinas', name: 'Viracopos (VCP)', country: 'BR' },
            { iata: 'GIG', city: 'Rio de Janeiro', name: 'Galeão (GIG)', country: 'BR' },
            { iata: 'SDU', city: 'Rio de Janeiro', name: 'Santos Dumont (SDU)', country: 'BR' },
            { iata: 'BSB', city: 'Brasília', name: 'Juscelino Kubitschek (BSB)', country: 'BR' },
            { iata: 'CNF', city: 'Belo Horizonte', name: 'Confins (CNF)', country: 'BR' },
            { iata: 'SSA', city: 'Salvador', name: 'L.E. Magalhães (SSA)', country: 'BR' },
            { iata: 'REC', city: 'Recife', name: 'Guararapes (REC)', country: 'BR' },
            { iata: 'FOR', city: 'Fortaleza', name: 'Pinto Martins (FOR)', country: 'BR' },
            { iata: 'POA', city: 'Porto Alegre', name: 'Salgado Filho (POA)', country: 'BR' },
            { iata: 'CWB', city: 'Curitiba', name: 'Afonso Pena (CWB)', country: 'BR' },
            { iata: 'FLN', city: 'Florianópolis', name: 'Hercílio Luz (FLN)', country: 'BR' },
            { iata: 'MAO', city: 'Manaus', name: 'Eduardo Gomes (MAO)', country: 'BR' },
            { iata: 'BEL', city: 'Belém', name: 'Val de Cans (BEL)', country: 'BR' },
            { iata: 'MCZ', city: 'Maceió', name: 'Zumbi dos Palmares (MCZ)', country: 'BR' },
            { iata: 'NAT', city: 'Natal', name: 'S.G. do Amarante (NAT)', country: 'BR' },
            { iata: 'VIX', city: 'Vitória', name: 'Eurico Salles (VIX)', country: 'BR' },
            { iata: 'GYN', city: 'Goiânia', name: 'Santa Genoveva (GYN)', country: 'BR' },
            { iata: 'CGB', city: 'Cuiabá', name: 'Marechal Rondon (CGB)', country: 'BR' },
            { iata: 'CGR', city: 'Campo Grande', name: 'Internacional (CGR)', country: 'BR' },
            { iata: 'PVH', city: 'Porto Velho', name: 'Jorge Teixeira (PVH)', country: 'BR' },
            { iata: 'SLZ', city: 'São Luís', name: 'Cunha Machado (SLZ)', country: 'BR' },
            { iata: 'THE', city: 'Teresina', name: 'Petrônio Portella (THE)', country: 'BR' },
            { iata: 'JPA', city: 'João Pessoa', name: 'Castro Pinto (JPA)', country: 'BR' },
            { iata: 'AJU', city: 'Aracaju', name: 'Santa Maria (AJU)', country: 'BR' },
            { iata: 'BPS', city: 'Porto Seguro', name: 'Jorge Amado (BPS)', country: 'BR' },
            { iata: 'UDI', city: 'Uberlândia', name: 'César Bombonato (UDI)', country: 'BR' },
            { iata: 'RAO', city: 'Ribeirão Preto', name: 'Leite Lopes (RAO)', country: 'BR' },
        ];

        const AIRPORTS_INTERNACIONAL = [
            { iata: 'EZE', city: 'Buenos Aires', name: 'Ezeiza (EZE)', country: 'AR' },
            { iata: 'SCL', city: 'Santiago', name: 'Arturo Merino (SCL)', country: 'CL' },
            { iata: 'LIM', city: 'Lima', name: 'Jorge Chávez (LIM)', country: 'PE' },
            { iata: 'BOG', city: 'Bogotá', name: 'El Dorado (BOG)', country: 'CO' },
            { iata: 'MIA', city: 'Miami', name: 'International (MIA)', country: 'US' },
            { iata: 'MCO', city: 'Orlando', name: 'International (MCO)', country: 'US' },
            { iata: 'JFK', city: 'Nova York', name: 'J.F. Kennedy (JFK)', country: 'US' },
            { iata: 'LAX', city: 'Los Angeles', name: 'International (LAX)', country: 'US' },
            { iata: 'LIS', city: 'Lisboa', name: 'Portela (LIS)', country: 'PT' },
            { iata: 'MAD', city: 'Madrid', name: 'Barajas (MAD)', country: 'ES' },
            { iata: 'CDG', city: 'Paris', name: 'Charles de Gaulle (CDG)', country: 'FR' },
            { iata: 'LHR', city: 'Londres', name: 'Heathrow (LHR)', country: 'GB' },
            { iata: 'FCO', city: 'Roma', name: 'Fiumicino (FCO)', country: 'IT' },
            { iata: 'MEX', city: 'Cid. do México', name: 'Benito Juárez (MEX)', country: 'MX' },
            { iata: 'CUN', city: 'Cancún', name: 'International (CUN)', country: 'MX' },
        ];

        // ═══════════════════════════════════════════════════════════
        //  CONFIG
        // ═══════════════════════════════════════════════════════════
        const GECKO_API = 'https://api.geckoapi.com.br/v1/extract';

        const AIRLINES = {
            'LATAM': { id: 'LATAM', label: 'LATAM', target: 'latamairlines.com', type: 'plp',
                capabilities: { money: true, points: true }, color: '#E30613', parser: 'latam' },
            'AZUL': { id: 'AZUL', label: 'Azul', target: 'voeazul.com.br', type: 'plp', capabilities: { money: true,
                    points: true }, color: '#0033A0', parser: 'azul' },
            'SMILES': { id: 'SMILES', label: 'Smiles', target: 'smiles.com.br', type: 'plp',
                capabilities: { money: true, points: true }, color: '#6B2D8B', parser: 'smiles' },
            'GOL': { id: 'GOL', label: 'GOL', target: 'voegol.com.br', type: 'plp', capabilities: { money: true,
                    points: false }, color: '#FF6600', parser: 'gol' },
        };

        // ═══════════════════════════════════════════════════════════
        //  STATE
        // ═══════════════════════════════════════════════════════════
        let region = 'nacional';
        let tripType = 'roundtrip';
        let searchType = 'both';
        let selectedAirlines = new Set(['LATAM', 'AZUL', 'SMILES', 'GOL']);
        let apiKey = localStorage.getItem('geckoApiKey') || '';
        let allFlights = { ida: [], volta: [] };
        let selectedIda = null;
        let selectedVolta = null;
        let fromAirportData = null;
        let toAirportData = null;

        // ═══════════════════════════════════════════════════════════
        //  INIT
        // ═══════════════════════════════════════════════════════════
        document.addEventListener('DOMContentLoaded', () => {
            if (apiKey) {
                document.getElementById('apiKeyInput').value = apiKey;
                updateApiStatus('configured');
            }
            setDefaultDates();
            renderAirlineToggles();
            updateStatusBar();
            initAirportSelectors();
            applyTripTypeUI();
        });

        function setDefaultDates() {
            const now = new Date();
            const ida = new Date(now);
            ida.setDate(ida.getDate() + 14);
            const volta = new Date(ida);
            volta.setDate(volta.getDate() + 7);
            document.getElementById('depDate').value = ida.toISOString().split('T')[0];
            document.getElementById('retDate').value = volta.toISOString().split('T')[0];
        }

        // ═══════════════════════════════════════════════════════════
        //  TRIP TYPE
        // ═══════════════════════════════════════════════════════════
        function setTripType(type) {
            tripType = type;
            document.querySelectorAll('#tripTypeBar .toggle-btn').forEach(b =>
                b.classList.toggle('active', b.dataset.type === type));
            applyTripTypeUI();
        }

        function applyTripTypeUI() {
            const returnField = document.getElementById('returnDateField');
            returnField.style.display = tripType === 'oneway' ? 'none' : '';
            if (tripType === 'oneway') {
                selectedVolta = null;
                allFlights.volta = [];
            }
        }

        // ═══════════════════════════════════════════════════════════
        //  AIRPORT SELECTORS
        // ═══════════════════════════════════════════════════════════
        function initAirportSelectors() {
            ['from', 'to'].forEach(type => {
                const input = document.getElementById(`${type}Airport`);
                const dropdown = document.getElementById(`${type}Dropdown`);
                input.addEventListener('input', () => handleAirportInput(type));
                input.addEventListener('focus', () => {
                    handleAirportInput(type);
                    setTimeout(() => { if (document.activeElement === input) dropdown.classList.add(
                            'show'); }, 50);
                });
                input.addEventListener('blur', () => {
                    setTimeout(() => dropdown.classList.remove('show'), 180);
                });
            });
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.airport-selector')) {
                    document.getElementById('fromDropdown').classList.remove('show');
                    document.getElementById('toDropdown').classList.remove('show');
                }
            });
        }

        function getAirportsForField(type) {
            if (type === 'from' && region === 'internacional') {
                return [...AIRPORTS_NACIONAL, ...AIRPORTS_INTERNACIONAL];
            }
            return region === 'nacional' ? AIRPORTS_NACIONAL : AIRPORTS_INTERNACIONAL;
        }

        function handleAirportInput(type) {
            const input = document.getElementById(`${type}Airport`);
            const wrap = input.parentElement;
            const dropdown = document.getElementById(`${type}Dropdown`);
            const value = input.value;
            wrap.classList.toggle('has-value', !!value.trim());
            const airports = getAirportsForField(type);
            const filtered = filterAirports(airports, value);
            if (filtered.length === 0) {
                dropdown.innerHTML = '<div class="no-results">Nenhum aeroporto encontrado</div>';
            } else {
                let html =
                    `<div class="airport-dropdown-header">${filtered.length} opções</div>`;
                for (const ap of filtered.slice(0, 24)) {
                    const escName = ap.name.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    html += `
                    <div class="airport-item" onmousedown="event.preventDefault();selectAirport('${type}','${ap.iata}','${ap.city}','${escName}')">
                      <span class="iata-code">${ap.iata}</span>
                      <div class="airport-info"><div class="city-name">${ap.city}</div><div class="airport-name">${ap.name}</div></div>
                    </div>`;
                }
                dropdown.innerHTML = html;
            }
            dropdown.classList.add('show');
        }

        function selectAirport(type, iata, city, name) {
            const input = document.getElementById(`${type}Airport`);
            const wrap = input.parentElement;
            document.getElementById(`${type}Dropdown`).classList.remove('show');
            input.value = `${iata} - ${city}`;
            wrap.classList.add('has-value');
            const data = { iata, city, name };
            if (type === 'from') fromAirportData = data;
            else toAirportData = data;
        }

        function clearAirport(type) {
            const input = document.getElementById(`${type}Airport`);
            const wrap = input.parentElement;
            document.getElementById(`${type}Dropdown`).classList.remove('show');
            input.value = '';
            wrap.classList.remove('has-value');
            if (type === 'from') fromAirportData = null;
            else toAirportData = null;
            input.focus();
        }

        function filterAirports(airports, query) {
            if (!query || !query.trim()) return airports;
            const q = query.toUpperCase().trim();
            return airports.filter(ap =>
                ap.iata.includes(q) || ap.city.toUpperCase().includes(q) || ap.name.toUpperCase().includes(
                q));
        }

        function extractIata(value) {
            const m = value.match(/\b([A-Z]{3})\b/i);
            return m ? m[1].toUpperCase() : value.trim().toUpperCase().replace(/[^A-Z]/g, '').substring(0, 3);
        }

        // ═══════════════════════════════════════════════════════════
        //  API KEY
        // ═══════════════════════════════════════════════════════════
        function saveApiKey() {
            const val = document.getElementById('apiKeyInput').value.trim();
            apiKey = val;
            localStorage.setItem('geckoApiKey', val);
            updateApiStatus(val ? 'configured' : 'empty');
            showToast(val ? '✅ Chave salva!' : '⚠️ Chave removida');
        }

        function updateApiStatus(status) {
            const el = document.getElementById('apiStatus');
            const map = {
                'configured': ['🟢 Configurada', '#4fc3f7'],
                'testing': ['🟡 Testando...', '#ffd54f'],
                'ok': ['🟢 Conectada', '#69f0ae'],
                'error': ['🔴 Falha', '#ff5252'],
                'empty': ['⚪ Não configurada', '#ffffff88'],
            };
            const [text, color] = map[status] || map['empty'];
            el.textContent = text;
            el.style.color = color;
        }

        async function testConnection() {
            if (!apiKey) { showToast('⚠️ Insira a chave da GeckoAPI primeiro'); return; }
            updateApiStatus('testing');
            try {
                const payload = { target: 'latamairlines.com', type: 'plp', from: 'GRU', to: 'GIG',
                    departureDate: getFutureDate(14), numAdults: 1, numChildren: 0, numInfants: 0 };
                const resp = await fetch(GECKO_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify(payload),
                });
                if (resp.ok) { updateApiStatus('ok');
                    showToast('✅ Conexão OK!'); } else {
                    const t = await resp.text();
                    updateApiStatus('error');
                    showToast(`❌ ${resp.status}: ${t.substring(0, 80)}`); }
            } catch (e) { updateApiStatus('error');
                showToast(`❌ ${e.message.substring(0, 80)}`); }
        }

        function getFutureDate(days) {
            const d = new Date();
            d.setDate(d.getDate() + days);
            return d.toISOString().split('T')[0];
        }

        // ═══════════════════════════════════════════════════════════
        //  REGION / SEARCH TYPE
        // ═══════════════════════════════════════════════════════════
        function setRegion(r) {
            region = r;
            document.querySelectorAll('#regionToggleBar .toggle-btn').forEach(b =>
                b.classList.toggle('active', b.dataset.region === r));
            clearAirport('from');
            clearAirport('to');
            updateStatusBar();
        }

        function setSearchType(type) {
            searchType = type;
            document.querySelectorAll('#searchTypeToggles .search-type-btn').forEach(b =>
                b.classList.toggle('active', b.dataset.type === type));
            renderAirlineToggles();
            updateStatusBar();
        }

        function isCompatible(airlineId) {
            const c = AIRLINES[airlineId];
            if (!c) return false;
            if (searchType === 'money') return c.capabilities.money;
            if (searchType === 'points') return c.capabilities.points;
            return true;
        }

        function renderAirlineToggles() {
            const container = document.getElementById('airlineToggles');
            container.innerHTML = '';
            for (const [id, cfg] of Object.entries(AIRLINES)) {
                const sel = selectedAirlines.has(id);
                const compat = isCompatible(id);
                const btn = document.createElement('button');
                btn.className = ['airline-toggle', sel ? 'active' : '', compat ? '' : 'incompatible'].join(
                    ' ').trim();
                btn.onclick = () => toggleAirline(id);
                btn.innerHTML =
                    `<span class="dot" style="background:${cfg.color}"></span> ${cfg.label}`;
                container.appendChild(btn);
            }
        }

        function toggleAirline(id) {
            if (selectedAirlines.has(id)) selectedAirlines.delete(id);
            else selectedAirlines.add(id);
            renderAirlineToggles();
            updateStatusBar();
        }

        function getActiveTargets() {
            const t = [];
            for (const id of selectedAirlines) {
                const c = AIRLINES[id];
                if (c && isCompatible(id)) t.push(c);
            }
            return t;
        }

        function updateStatusBar() {
            const bar = document.getElementById('statusBar');
            const targets = getActiveTargets();
            bar.className = 'status-bar';
            if (targets.length === 0) {
                bar.textContent = '⚠️ Nenhuma cia aérea compatível selecionada';
                bar.classList.add('warning');
            } else {
                const tipoViagem = tripType === 'oneway' ? '➡️ Apenas Ida' : '🔄 Ida e Volta';
                const tipoBusca = searchType === 'money' ? '💰 Dinheiro' : searchType === 'points' ?
                    '🎯 Pontos' : '🔄 Ambos';
                bar.textContent =
                    `${tipoViagem} | ${region==='nacional'?'🇧🇷 Nacional':'🌎 Internacional'} | ${tipoBusca} | 🔍 ${targets.length} cia(s): ${targets.map(t=>t.label).join(', ')}`;
                bar.classList.add('ok');
            }
        }

        // ═══════════════════════════════════════════════════════════
        //  SEARCH ENGINE
        // ═══════════════════════════════════════════════════════════
        async function doSearch() {
            const targets = getActiveTargets();
            if (targets.length === 0) { showToast('⚠️ Selecione ao menos uma cia aérea compatível'); return; }
            if (!apiKey) { showToast('⚠️ Configure sua chave da GeckoAPI'); return; }

            const fromVal = document.getElementById('fromAirport').value.trim();
            const toVal = document.getElementById('toAirport').value.trim();
            const depDate = document.getElementById('depDate').value;
            const retDate = document.getElementById('retDate').value;
            const numAdults = parseInt(document.getElementById('numAdults').value) || 1;

            const from = fromAirportData?.iata || extractIata(fromVal);
            const to = toAirportData?.iata || extractIata(toVal);

            if (!from || !to || !depDate) { showToast('⚠️ Preencha origem, destino e data de ida'); return; }
            if (from === to) { showToast('⚠️ Origem e destino não podem ser iguais'); return; }

            const btn = document.getElementById('btnSearch');
            btn.disabled = true;
            btn.textContent = '⏳ Buscando...';
            document.getElementById('loadingOverlay').classList.add('show');
            document.getElementById('resultsSection').classList.remove('show');
            document.getElementById('summaryBar').classList.remove('show');
            allFlights = { ida: [], volta: [] };
            selectedIda = null;
            selectedVolta = null;

            const requests = [];
            for (const tgt of targets) {
                const basePayload = {
                    target: tgt.target,
                    type: tgt.type,
                    from,
                    to,
                    departureDate: depDate,
                    numAdults,
                    numChildren: 0,
                    numInfants: 0,
                };
                requests.push({ cfg: tgt, payload: { ...basePayload }, direction: 'ida' });
                if (tripType === 'roundtrip' && retDate) {
                    requests.push({
                        cfg: tgt,
                        payload: { ...basePayload, from: to, to: from, departureDate: retDate },
                        direction: 'volta',
                    });
                }
            }

            document.getElementById('loadingText').textContent =
                `Consultando ${requests.length} chamada(s) em ${targets.length} cia(s)...`;
            updateStatusBar();

            const results = await Promise.allSettled(
                requests.map(async (req) => {
                    const resp = await fetch(GECKO_API, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                        body: JSON.stringify(req.payload),
                    });
                    const text = await resp.text();
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${text.substring(0, 200)}`);
                    let json;
                    try { json = JSON.parse(text); } catch (e) { throw new Error(
                            `JSON inválido: ${text.substring(0, 200)}`); }
                    return { direction: req.direction, cfg: req.cfg, raw: json };
                })
            );

            let successCount = 0;
            const errors = [];

            for (const r of results) {
                if (r.status === 'fulfilled') {
                    const { direction, cfg, raw } = r.value;
                    const flights = parseFlights(raw, cfg);
                    console.log(
                        `[Parser] ${cfg.label} (${cfg.parser||'generic'}) ${direction}: ${flights.length} voo(s)`
                    );
                    for (const f of flights.slice(0, 2)) {
                        console.log(`  → ${f.from}→${f.to} ${f.dep}→${f.arr} stops:${f.stops} options:${f.fareOptions.length} ` +
                            f.fareOptions.map(fo =>
                                `${fo.type} ${fo.money!=null?'R$'+fo.money:''} ${fo.miles!=null?fo.miles+'pts':''}${fo.costTax!=null?' +taxa R$'+fo.costTax:''}`
                            ).join(' | ')
                        );
                    }
                    if (flights.length > 0) {
                        if (direction === 'ida') allFlights.ida.push(...flights);
                        else allFlights.volta.push(...flights);
                        successCount++;
                    } else {
                        // Loga a estrutura do JSON para debug
                        const rawData = raw?.data;
                        const keys = rawData ? Object.keys(rawData).slice(0, 10).join(', ') : 'null';
                        console.warn(`[Parser] ${cfg.label} ${direction}: 0 voos. Chaves de data: ${keys}`);
                        errors.push({ direction, label: cfg.label,
                            reason: `Parser: 0 voos (keys: ${keys})` });
                    }
                } else {
                    const reason = r.reason?.message || String(r.reason);
                    console.error(`[Erro] ${r.reason?.cfg?.label || '?'}: ${reason}`);
                    errors.push({ direction: '?', label: r.reason?.cfg?.label || '?', reason });
                }
            }

            console.log(`[Resultado] ${successCount} sucesso(s), ${errors.length} erro(s)`);
            if (errors.length > 0) console.table(errors);

            // Ordenar por preço (menor primeiro)
            allFlights.ida.sort((a, b) => sortScore(a) - sortScore(b));
            allFlights.volta.sort((a, b) => sortScore(a) - sortScore(b));

            btn.disabled = false;
            btn.textContent = '🔍 Buscar';
            document.getElementById('loadingOverlay').classList.remove('show');
            document.getElementById('resultsSection').classList.add('show');
            renderResults(errors);
            document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth' });
        }

        function sortScore(f) {
            const fo = f.fareOptions[0];
            if (!fo) return Infinity;
            if (searchType === 'points') return fo.miles ?? Infinity;
            if (searchType === 'money') return fo.money ?? Infinity;
            return fo.money ?? fo.miles ?? Infinity;
        }

        // ╔══════════════════════════════════════════════════════════╗
        // ║  DISPATCHER                                            ║
        // ╚══════════════════════════════════════════════════════════╝
        function parseFlights(raw, cfg) {
            const data = raw?.data;
            if (!data) return [];

            const parserName = cfg.parser || 'generic';
            switch (parserName) {
                case 'azul':
                    return parseAzul(data, cfg);
                case 'smiles':
                case 'gol':
                    return parseSmilesGol(data, cfg);
                case 'latam':
                    return parseLatam(data, cfg);
                default:
                    return parseGeneric(raw, cfg);
            }
        }

        // ╔══════════════════════════════════════════════════════════╗
        // ║  AZUL                                                  ║
        // ║  data.trips[].journeys[]  +  fares[].pointsOptions[]   ║
        // ╚══════════════════════════════════════════════════════════╝
        function parseAzul(data, cfg) {
            const flights = [];
            for (const trip of data.trips || []) {
                for (const journey of trip.journeys || []) {
                    if (!journey.available) continue;
                    const seg = journey.segments?.[0];
                    const flightNum = seg?.flight?.flightNumber || '';
                    const carrier = seg?.flight?.carrierCode || 'AD';
                    const aircraft = seg?.flight?.equipmentName || '';

                    // Extrai TODAS as fares (dinheiro + pontos)
                    const fareOptions = [];
                    for (const fare of journey.fares || []) {
                        // ── Tarifa em dinheiro ──
                        if (fare.total?.amount != null) {
                            fareOptions.push({
                                type: fare.productClass?.name || fare.productClass?.code || 'Tarifa',
                                money: Number(fare.total.amount),
                                miles: null,
                                costTax: null,
                                cabin: fare.cabin || null,
                                classOfService: fare.classOfService || null,
                            });
                        }
                        // ── Tarifas em pontos (pointsOptions) ──
                        for (const po of fare.pointsOptions || []) {
                            // pointsOptions pode ter estrutura: { amount, taxes } ou { points, amount }
                            const pts = po.amount ?? po.points ?? po.miles ?? null;
                            const tax = po.taxes ?? po.tax ?? po.costTax ?? null;
                            if (pts != null) {
                                fareOptions.push({
                                    type: 'Pontos',
                                    money: null,
                                    miles: Number(pts),
                                    costTax: tax != null ? Number(tax) : null,
                                    cabin: fare.cabin || null,
                                    classOfService: fare.classOfService || null,
                                });
                            }
                        }
                    }

                    if (fareOptions.length === 0) continue;

                    flights.push({
                        id: `azul-${flightNum}-${journey.position||journey.id||Math.random().toString(36).slice(2,8)}`,
                        airline: cfg.label,
                        airlineColor: cfg.color,
                        from: journey.origin || trip.origin,
                        to: journey.destination || trip.destination,
                        dep: fmtTimeFromISO(journey.departure),
                        arr: fmtTimeFromISO(journey.arrival),
                        durationStr: formatDuration(journey.duration),
                        stops: journey.stopsCount || 0,
                        flightNumbers: [flightNum].filter(Boolean),
                        aircraft,
                        fareOptions: filterFareOptionsBySearchType(fareOptions),
                    });
                }
            }
            return flights;
        }

        // ╔══════════════════════════════════════════════════════════╗
        // ║  SMILES / GOL                                          ║
        // ║  data.offers[]  +  fareOptions[]                       ║
        // ║  SMILES: APENAS SMILES e SMILES_CLUB                   ║
        // ╚══════════════════════════════════════════════════════════╝
        function parseSmilesGol(data, cfg) {
            const flights = [];
            const offers = data.offers || [];

            for (const offer of offers) {
                const allFareOptions = [];
                for (const fo of offer.fareOptions || []) {
                    allFareOptions.push({
                        type: fo.fareType || 'Tarifa',
                        money: fo.money != null ? Number(fo.money) : null,
                        miles: fo.miles != null ? Number(fo.miles) : null,
                        costTax: fo.costTax != null ? Number(fo.costTax) : null,
                        cabin: offer.cabin || fo.cabin || null,
                        classOfService: fo.productClass || fo.classOfService || null,
                        uid: fo.uid || null,
                    });
                }

                // Se for Smiles, filtra APENAS SMILES e SMILES_CLUB
                let fareOptions;
                if (cfg.parser === 'smiles') {
                    fareOptions = allFareOptions.filter(fo =>
                        fo.type === 'SMILES' || fo.type === 'SMILES_CLUB'
                    );
                } else {
                    fareOptions = allFareOptions;
                }

                // Se não tem fareOptions mas tem priceHint, cria uma
                if (fareOptions.length === 0 && offer.priceHint) {
                    fareOptions.push({
                        type: 'MILHAS',
                        money: null,
                        miles: Number(offer.priceHint),
                        costTax: null,
                        cabin: offer.cabin || null,
                    });
                }

                if (fareOptions.length === 0) continue;

                flights.push({
                    id: `smiles-${offer.uid||Math.random().toString(36).slice(2,8)}`,
                    airline: cfg.label,
                    airlineColor: cfg.color,
                    from: offer.departureAirport,
                    to: offer.arrivalAirport,
                    dep: fmtTimeFromISO(offer.departureTime),
                    arr: fmtTimeFromISO(offer.arrivalTime),
                    durationStr: '—',
                    stops: offer.stops || 0,
                    flightNumbers: [],
                    fareOptions: filterFareOptionsBySearchType(fareOptions),
                });
            }

            // Se não tem offers mas tem cheapestOffer
            if (flights.length === 0 && data.cheapestOffer) {
                const o = data.cheapestOffer;
                const allFareOptions = [];
                for (const fo of o.fareOptions || []) {
                    allFareOptions.push({
                        type: fo.fareType || 'Tarifa',
                        money: fo.money != null ? Number(fo.money) : null,
                        miles: fo.miles != null ? Number(fo.miles) : null,
                        costTax: fo.costTax != null ? Number(fo.costTax) : null,
                        cabin: o.cabin || null,
                        classOfService: fo.productClass || null,
                    });
                }
                let fareOptions;
                if (cfg.parser === 'smiles') {
                    fareOptions = allFareOptions.filter(fo =>
                        fo.type === 'SMILES' || fo.type === 'SMILES_CLUB'
                    );
                } else {
                    fareOptions = allFareOptions;
                }
                if (fareOptions.length > 0) {
                    flights.push({
                        id: `smiles-cheapest-${o.uid||Math.random().toString(36).slice(2,8)}`,
                        airline: cfg.label,
                        airlineColor: cfg.color,
                        from: o.departureAirport,
                        to: o.arrivalAirport,
                        dep: fmtTimeFromISO(o.departureTime),
                        arr: fmtTimeFromISO(o.arrivalTime),
                        durationStr: '—',
                        stops: o.stops || 0,
                        flightNumbers: [],
                        fareOptions: filterFareOptionsBySearchType(fareOptions),
                    });
                }
            }

            return flights;
        }

        // ╔══════════════════════════════════════════════════════════╗
        // ║  LATAM                                                 ║
        // ║  Suporta múltiplas estruturas:                          ║
        // ║  - data.availability.flights[]                          ║
        // ║  - data.flights[]                                       ║
        // ║  - data.itineraries[]                                   ║
        // ║  - data.results[]                                       ║
        // ╚══════════════════════════════════════════════════════════╝
        function parseLatam(data, cfg) {
            const flights = [];

            // Tenta várias estruturas da LATAM
            let items = null;

            // Estrutura 1: data.availability (mais comum)
            if (data.availability) {
                if (Array.isArray(data.availability.flights)) items = data.availability.flights;
                else if (Array.isArray(data.availability)) items = data.availability;
            }
            // Estrutura 2: direto
            if (!items && Array.isArray(data.flights)) items = data.flights;
            if (!items && Array.isArray(data.itineraries)) items = data.itineraries;
            if (!items && Array.isArray(data.results)) items = data.results;
            if (!items && Array.isArray(data.journeys)) items = data.journeys;
            if (!items && Array.isArray(data.offers)) items = data.offers;

            // Scan recursivo se ainda não achou
            if (!items) {
                const scan = (obj, depth) => {
                    if (depth > 8 || !obj || typeof obj !== 'object') return null;
                    if (Array.isArray(obj) && obj.length > 0 && typeof obj[0] === 'object') return obj;
                    for (const v of Object.values(obj)) {
                        const r = scan(v, depth + 1);
                        if (r) return r;
                    }
                    return null;
                };
                items = scan(data, 0);
            }

            if (!items || !Array.isArray(items)) {
                console.warn('[LATAM] Não encontrei array de voos. Chaves:', Object.keys(data).join(', '));
                return flights;
            }

            console.log(`[LATAM] Encontrei ${items.length} itens`);

            for (const item of items) {
                if (!item || typeof item !== 'object') continue;

                // Múltiplos caminhos para segmentos
                let segments = [];
                for (const k of ['segments', 'flights', 'legs', 'itineraries', 'journeys', 'connections']) {
                    if (Array.isArray(item[k]) && item[k].length > 0) { segments = item[k]; break; }
                }
                if (segments.length === 0 && (item.origin || item.from || item.departureAirport)) {
                    segments = [item];
                }

                if (segments.length === 0) continue;

                const first = segments[0];
                const last = segments[segments.length - 1];

                const pick = (obj, ...keys) => {
                    for (const k of keys) { if (obj[k] !== undefined && obj[k] !== null) return obj[k]; }
                    return null;
                };
                const pickNested = (obj, prefix, ...keys) => {
                    if (obj[prefix] && typeof obj[prefix] === 'object')
                        for (const k of keys) { if (obj[prefix][k] !== undefined && obj[prefix][k] !== null)
                                return obj[prefix][k]; }
                    return null;
                };

                const fromCode = pick(first, 'origin', 'from', 'departureAirport', 'departureAirportCode') ||
                    pickNested(first, 'departure', 'airport', 'code', 'iata') ||
                    pickNested(first, 'origin', 'airport', 'code') || '?';
                const toCode = pick(last, 'destination', 'to', 'arrivalAirport', 'arrivalAirportCode') ||
                    pickNested(last, 'arrival', 'airport', 'code', 'iata') ||
                    pickNested(last, 'destination', 'airport', 'code') || '?';

                const depTime = pick(first, 'departureTime', 'departure', 'departureDateTime', 'depTime') ||
                    pickNested(first, 'departure', 'time', 'dateTime', 'scheduled') || null;
                const arrTime = pick(last, 'arrivalTime', 'arrival', 'arrivalDateTime', 'arrTime') ||
                    pickNested(last, 'arrival', 'time', 'dateTime', 'scheduled') || null;

                const flightNumbers = segments.map(s =>
                    pick(s, 'flightNumber', 'flight', 'number', 'code') || null
                ).filter(Boolean);

                const stops = Math.max(0, segments.length - 1);
                const aircraft = pick(first, 'equipmentName', 'aircraft', 'equipment') ||
                    pickNested(first, 'flight', 'equipmentName', 'equipmentType') || null;

                // ── FARE OPTIONS ──
                const fareOptions = [];
                // Caminho 1: item.fares[]
                if (Array.isArray(item.fares)) {
                    for (const f of item.fares) {
                        const fo = {
                            type: f.productClass?.name || f.fareClass || f.brand || f.name || 'Tarifa',
                            money: f.total?.amount ?? f.price?.amount ?? f.amount ?? f.price ?? null,
                            miles: f.miles ?? f.points ?? f.pointsRequired ?? null,
                            costTax: f.taxes ?? f.tax ?? f.costTax ?? null,
                            cabin: f.cabin || item.cabin || null,
                            classOfService: f.classOfService || f.bookingClass || null,
                        };
                        if (fo.money != null || fo.miles != null) fareOptions.push(fo);
                    }
                }
                // Caminho 2: item.fareOptions[]
                if (fareOptions.length === 0 && Array.isArray(item.fareOptions)) {
                    for (const fo of item.fareOptions) {
                        fareOptions.push({
                            type: fo.fareType || fo.type || fo.name || 'Tarifa',
                            money: fo.money ?? fo.price ?? fo.amount ?? null,
                            miles: fo.miles ?? fo.points ?? null,
                            costTax: fo.costTax ?? fo.taxes ?? null,
                            cabin: item.cabin || fo.cabin || null,
                            classOfService: fo.productClass || fo.classOfService || null,
                        });
                    }
                }
                // Caminho 3: item.price / item.total
                if (fareOptions.length === 0) {
                    const m = item.total?.amount ?? item.price?.amount ?? item.price ?? item.amount ?? item
                        .priceHint;
                    const p = item.miles ?? item.points ?? item.pointsRequired;
                    if (m || p) fareOptions.push({
                        type: 'Tarifa',
                        money: m ? Number(m) : null,
                        miles: p ? Number(p) : null,
                        costTax: item.taxes ?? item.tax ?? null,
                        cabin: item.cabin || null,
                    });
                }
                // Caminho 4: scan recursivo por preço dentro do item
                if (fareOptions.length === 0) {
                    const found = {};
                    const findPrice = (obj, depth) => {
                        if (!obj || typeof obj !== 'object' || depth > 6) return;
                        if (Array.isArray(obj)) { for (const v of obj) findPrice(v, depth + 1);
                            return; }
                        if ((obj.amount || obj.total || obj.price) && !found.money) {
                            found.money = obj.amount || obj.total || obj.price;
                        }
                        if ((obj.points || obj.miles || obj.pointsRequired) && !found.miles) {
                            found.miles = obj.points || obj.miles || obj.pointsRequired;
                        }
                        if ((obj.taxes || obj.tax || obj.costTax) && !found.tax) {
                            found.tax = obj.taxes || obj.tax || obj.costTax;
                        }
                        for (const v of Object.values(obj)) findPrice(v, depth + 1);
                    };
                    findPrice(item, 0);
                    if (found.money || found.miles) {
                        fareOptions.push({
                            type: 'Tarifa',
                            money: found.money ? Number(found.money) : null,
                            miles: found.miles ? Number(found.miles) : null,
                            costTax: found.tax ? Number(found.tax) : null,
                        });
                    }
                }

                if (fareOptions.length === 0) continue;

                flights.push({
                    id: `latam-${flightNumbers[0]||Math.random().toString(36).slice(2,8)}`,
                    airline: cfg.label,
                    airlineColor: cfg.color,
                    from: fromCode,
                    to: toCode,
                    dep: fmtTimeFromISO(depTime),
                    arr: fmtTimeFromISO(arrTime),
                    durationStr: formatDuration(item.duration || first.duration || null),
                    stops,
                    flightNumbers,
                    aircraft,
                    fareOptions: filterFareOptionsBySearchType(fareOptions),
                });
            }

            return flights;
        }

        // ╔══════════════════════════════════════════════════════════╗
        // ║  GENÉRICO (fallback)                                   ║
        // ╚══════════════════════════════════════════════════════════╝
        function parseGeneric(raw, cfg) {
            const flights = [];
            let data = raw?.data;
            if (!data) return flights;

            let items = null;
            if (Array.isArray(data)) items = data;
            else {
                for (const key of ['trips', 'offers', 'journeys', 'results', 'items', 'flights', 'itineraries',
                        'availability'
                    ]) {
                    if (Array.isArray(data[key])) { items = data[key]; break; }
                    // availability.flights
                    if (data[key] && Array.isArray(data[key].flights)) { items = data[key].flights; break; }
                }
                if (!items) {
                    const scan = (obj) => {
                        if (Array.isArray(obj) && obj.length > 0 && typeof obj[0] === 'object') return obj;
                        if (obj && typeof obj === 'object')
                            for (const v of Object.values(obj)) { const r = scan(v); if (r) return r; }
                        return null;
                    };
                    items = scan(data);
                }
            }
            if (!items) return flights;

            for (const item of items) {
                const fos = [];
                // fares
                if (Array.isArray(item.fares)) {
                    for (const f of item.fares) {
                        const fo = {
                            type: f.productClass?.name || f.fareClass || f.name || 'Tarifa',
                            money: f.total?.amount ?? f.price?.amount ?? f.amount ?? f.price ?? null,
                            miles: f.miles ?? f.points ?? null,
                            costTax: f.taxes ?? f.tax ?? null,
                        };
                        if (fo.money != null || fo.miles != null) fos.push(fo);
                    }
                }
                // fareOptions
                if (fos.length === 0 && Array.isArray(item.fareOptions)) {
                    for (const fo of item.fareOptions) {
                        fos.push({
                            type: fo.fareType || fo.type || 'Tarifa',
                            money: fo.money ?? fo.price ?? null,
                            miles: fo.miles ?? fo.points ?? null,
                            costTax: fo.costTax ?? fo.taxes ?? null,
                        });
                    }
                }
                // fallback
                if (fos.length === 0) {
                    const m = item.total?.amount ?? item.price ?? item.amount ?? item.priceHint;
                    const p = item.miles ?? item.points ?? item.pointsRequired;
                    if (m || p) fos.push({ type: 'Tarifa', money: m ? Number(m) : null, miles: p ? Number(p) :
                            null, costTax: null });
                }
                if (fos.length === 0) continue;

                const seg = item.segments?.[0] || item;
                flights.push({
                    id: `gen-${Math.random().toString(36).slice(2,8)}`,
                    airline: cfg.label,
                    airlineColor: cfg.color,
                    from: item.origin || item.from || item.departureAirport || seg.origin || seg.from || '?',
                    to: item.destination || item.to || item.arrivalAirport || seg.destination || seg.to || '?',
                    dep: fmtTimeFromISO(item.departure || item.departureTime || seg.departure || seg
                    .departureTime),
                    arr: fmtTimeFromISO(item.arrival || item.arrivalTime || seg.arrival || seg.arrivalTime),
                    durationStr: formatDuration(item.duration || seg.duration),
                    stops: item.stopsCount ?? item.stops ?? seg.stopsCount ?? 0,
                    flightNumbers: [],
                    fareOptions: filterFareOptionsBySearchType(fos),
                });
            }
            return flights;
        }

        // ╔══════════════════════════════════════════════════════════╗
        // ║  FILTRO POR SEARCH TYPE                                ║
        // ╚══════════════════════════════════════════════════════════╝
        function filterFareOptionsBySearchType(fareOptions) {
            if (searchType === 'both') return fareOptions;
            if (searchType === 'money') {
                // Apenas opções com valor em dinheiro
                return fareOptions.filter(fo => fo.money != null);
            }
            if (searchType === 'points') {
                // Apenas opções com milhas/pontos
                return fareOptions.filter(fo => fo.miles != null);
            }
            return fareOptions;
        }

        // ═══════════════════════════════════════════════════════════
        //  HELPERS
        // ═══════════════════════════════════════════════════════════
        function fmtTimeFromISO(t) {
            if (!t) return null;
            const s = String(t).trim();
            const isoMatch = s.match(/T(\d{2}:\d{2})/);
            if (isoMatch) return isoMatch[1];
            const hm = s.match(/(\d{1,2}:\d{2})/);
            if (hm) return hm[1];
            return null;
        }

        function formatDuration(d) {
            if (!d) return '—';
            const s = String(d).trim();
            const isoH = s.match(/(\d+)H/);
            const isoM = s.match(/(\d+)M/);
            if (isoH || isoM) {
                const h = isoH ? parseInt(isoH[1]) : 0;
                const m = isoM ? parseInt(isoM[1]) : 0;
                return `${h}h${String(m).padStart(2,'0')}m`;
            }
            const hm = s.match(/(\d+):(\d+)/);
            if (hm) return `${parseInt(hm[1])}h${String(parseInt(hm[2])).padStart(2,'0')}m`;
            return s;
        }

        // ═══════════════════════════════════════════════════════════
        //  RESULTS RENDER
        // ═══════════════════════════════════════════════════════════
        function renderResults(errors) {
            const container = document.getElementById('tripColumns');
            const showVoltaCol = tripType === 'roundtrip';
            container.className = 'trip-columns' + (showVoltaCol ? '' : ' single');

            let html = buildTripColumn('ida', '🟢 Ida', allFlights.ida, errors.filter(e => e.direction === 'ida'));
            if (showVoltaCol) {
                html += buildTripColumn('volta', '🔴 Volta', allFlights.volta, errors.filter(e => e.direction ===
                    'volta'));
            }
            container.innerHTML = html;

            ['ida', 'volta'].forEach(dir => {
                document.querySelectorAll(`.flight-card[data-direction="${dir}"]`).forEach(card => {
                    card.addEventListener('click', () => selectFlight(dir, card.dataset.flightId));
                });
            });
            updateSummary();
        }

        function buildTripColumn(dir, label, flights, errors) {
            let body = '';

            if (!flights.length) {
                body = '<div class="empty">Nenhum voo encontrado</div>';
                if (errors && errors.length > 0) {
                    body +=
                        `<div style="padding:8px;background:#fffbe6;margin:8px;border-radius:6px;font-size:0.72rem;color:#795548;white-space:pre-wrap;">`;
                    for (const e of errors) {
                        body += `⚠️ ${e.label}: ${e.reason}\n`;
                    }
                    body += `</div>`;
                }
            } else {
                for (const f of flights) {
                    const isDirect = f.stops === 0;
                    const sBadge = isDirect ?
                        '<span class="badge badge-direct">Direto</span>' :
                        `<span class="badge badge-stops">${f.stops} parada(s)</span>`;
                    const fnBadge = f.flightNumbers.length ?
                        `<span class="badge badge-flight">✈️ ${f.flightNumbers.join(', ')}</span>` : '';
                    const acBadge = f.aircraft ? `<span class="badge badge-fare">${f.aircraft}</span>` : '';

                    // Tabela de fare options
                    let fareTable = '';
